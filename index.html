                                    return (
                                        <>
                                            {/* TABS HEADER */}
                                            {availableTabs.length > 1 && (
                                                <div className={`w-full flex px-3 pt-3 z-50 shrink-0 gap-1 ${isGlass ? 'bg-transparent' : 'bg-gray-100 dark:bg-[#262626]'}`}>
                                                    {availableTabs.map(tab => (
                                                        <button 
                                                            key={tab.id}
                                                            onClick={() => setActiveTab(tab.id)}
                                                            className={`flex-1 py-3 text-[13px] font-bold rounded-t-2xl transition-all ${
                                                                activeTab === tab.id 
                                                                ? (isGlass ? 'bg-white/20 dark:bg-black/40 text-gray-900 dark:text-white backdrop-blur-2xl' : 'bg-white dark:bg-[#171717] text-gray-900 dark:text-white') 
                                                                : (isGlass ? 'text-gray-700 dark:text-gray-300 hover:bg-white/10' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-[#404040]')
                                                            }`}
                                                        >
                                                            {tab.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}

                                            <button 
                                                onClick={() => setCurrentView('calendar')}
                                                className={`absolute ${availableTabs.length > 1 ? 'top-[4.5rem]' : 'top-6'} right-5 z-50 p-2 opacity-40 hover:opacity-100 transition-opacity text-gray-800 dark:text-white`}
                                            >
                                                <CalendarIcon className="w-6 h-6" strokeWidth={1.5} />
                                            </button>

                                            {/* MAIN CARD CONTAINER (Isolates everything below the tabs) */}
                                            <div className={`flex-1 flex flex-col min-h-0 ${isGlass ? 'bg-white/20 dark:bg-black/40 backdrop-blur-2xl' : 'bg-white dark:bg-[#171717]'}`}>
                                                
                                                {/* FIXED HEADER PORTION */}
                                                <div className={`w-full z-40 px-5 transition-all duration-500 ease-in-out shrink-0 relative ${
                                                    isScrolled ? `pt-6 pb-3` : `${availableTabs.length > 1 ? 'pt-6' : 'pt-16'} pb-8`
                                                }`}>
                                                    
                                                    {activeTab === 'spending' && (
                                                        <div className="flex flex-col items-center justify-center w-full relative">
                                                            <span className={`font-bold ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-800' : 'text-gray-400 dark:text-gray-400'} uppercase tracking-widest transition-all duration-500 ${
                                                                isScrolled ? 'text-[10px] mb-0.5' : 'text-sm mb-2'
                                                            }`}>Sisa Uang</span>
                                                            
                                                            <div className={`flex items-start justify-center ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-900 dark:text-white'} transition-all duration-500 ${
                                                                isScrolled ? 'mb-3' : 'mb-6'
                                                            }`}>
                                                                <span className={`font-medium ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'} transition-all duration-500 ${
                                                                isScrolled ? 'text-xs mt-1 mr-1' : 'text-xl mt-3 mr-1'
                                                                }`}>Rp</span>
                                                                <span className={`font-bold tracking-tight leading-none transition-all duration-500 ${
                                                                isScrolled ? 'text-3xl' : 'text-[clamp(2.2rem,11vw,4.5rem)]'
                                                                }`}>
                                                                <AnimatedNumber value={remaining} formatFn={formatNumber} />
                                                                </span>
                                                            </div>
                                                            
                                                            <div className={`overflow-hidden transition-all duration-500 flex justify-center items-center gap-2 ${
                                                                isScrolled ? 'max-h-0 opacity-0 mb-0' : 'max-h-20 opacity-100 mb-8'
                                                            }`}>
                                                                <div className={`text-sm font-semibold px-4 py-1.5 rounded-full flex items-center shadow-sm transition-colors ${
                                                                    isDangerBadge ? `bg-red-50/80 dark:bg-red-900/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-800/50 animate-pulse ${isGlass ? 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : 'backdrop-blur-md'}` : `${uiStyle.cardSoft}`
                                                                }`}>
                                                                    <span>Sisa {daysLeft} hari</span>
                                                                    <span className={`mx-2 ${isDangerBadge ? "text-red-300 dark:text-red-800" : "text-gray-300 dark:text-gray-500"}`}>•</span>
                                                                    <span>Rp {formatNumber(Math.round(Math.max(0, dailyAllowance)))} / hari</span>
                                                                </div>
                                                                <button onClick={(e) => { e.stopPropagation(); setIsIncomeModalOpen(true); }} className={`p-2 rounded-full hover:opacity-80 transition-colors shadow-sm shrink-0 ${uiStyle.cardSoft}`}>
                                                                    <Plus className="w-4 h-4" strokeWidth={3} />
                                                                </button>
                                                            </div>

                                                            <div 
                                                                className={`relative w-full border-[3px] ring-1 transition-all duration-500 ease-in-out ${
                                                                    percentage === 0 ? 'border-red-600 dark:border-red-500 animate-pulse bg-red-50 dark:bg-red-900/20 ring-red-200 dark:ring-red-900/50' : (isGlass ? 'border-white/50 dark:border-white/10 ring-white/20 dark:ring-white/5' : 'border-white dark:border-gray-900 ring-gray-200 dark:ring-gray-700')
                                                                } ${isScrolled ? 'h-6 rounded-md' : 'h-14 rounded-xl'} ${isGlass ? 'bg-white/20 dark:bg-black/20' : 'bg-gray-200 dark:bg-gray-800'}`}
                                                                style={{ boxShadow: getGlowStyle() }}
                                                            >
                                                                <div className={`absolute inset-0 overflow-hidden transition-all duration-500 ${isScrolled ? 'rounded-[4px]' : 'rounded-[9px]'}`}>
                                                                    <div className={`absolute inset-0 bg-red-500 z-20 transition-opacity duration-500 ease-out pointer-events-none ${isTakingDamage ? 'opacity-60' : 'opacity-0'}`}></div>
                                                                    <div className={`absolute inset-0 bg-green-500 z-20 transition-opacity duration-500 ease-out pointer-events-none ${isHealing ? 'opacity-60' : 'opacity-0'}`}></div>
                                                                    <div className={`h-full transition-all relative z-0`} style={getBarStyle()}>
                                                                        <div className="absolute inset-0 bg-white/30 dark:bg-white/10 animate-breathe"></div>
                                                                    </div>
                                                                </div>

                                                                <div className={`absolute inset-0 flex items-center justify-start z-10 pointer-events-none transition-all duration-500 ${
                                                                    isScrolled ? 'px-2' : 'px-4'
                                                                }`}>
                                                                <span className={`font-bold transition-all duration-500 ${
                                                                    percentage < 40 && percentage > 0 ? (isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-800 dark:text-gray-200') : percentage === 0 ? 'text-red-500' : 'text-white/90'
                                                                } ${isScrolled ? 'text-[10px]' : 'text-sm'}`}>
                                                                    {percentage.toFixed(0)}%
                                                                </span>
                                                                </div>
                                                            </div>

                                                            {appSettings.showRecap && yesterdayRecap && (
                                                                <div className={`overflow-hidden transition-all duration-500 w-full ${
                                                                    isScrolled ? 'max-h-20 opacity-100 mt-3' : 'max-h-0 opacity-0 mt-0'
                                                                }`}>
                                                                    <div className={`p-2 rounded-lg text-[11px] font-bold flex items-center justify-between ${
                                                                        yesterdayRecap.overspent 
                                                                        ? `bg-red-50/80 dark:bg-red-900/40 border border-red-200 dark:border-red-800/50 text-red-700 dark:text-red-400 animate-pulse ${isGlass ? 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : 'backdrop-blur-md'}` 
                                                                        : `theme-bg-light theme-border theme-text ${uiStyle.cardSoft}`
                                                                    }`}>
                                                                        <span>{yesterdayRecap.overspent ? '⚠️ Kemarin Overbudget!' : '🔥 Kemarin Hemat!'}</span>
                                                                        <span>{yesterdayRecap.overspent ? '-' : '+'} Rp {formatNumber(yesterdayRecap.amount)}</span>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}

                                                    {activeTab === 'debt' && (() => {
                                                        const totalDebtPct = debtProgress.totalPrincipal > 0 ? (debtProgress.remaining / debtProgress.totalPrincipal) * 100 : 0;
                                                        let isDanger = false;
                                                        let nearestBadgeText = 'Tidak ada deadline terdekat';
                                                        if (nearestDeadline) {
                                                            nearestBadgeText = `⚠️ Deadline: ${formatIDDate(nearestDeadline.date.toISOString())}`;
                                                            const now = new Date();
                                                            now.setHours(0,0,0,0);
                                                            const diffTime = nearestDeadline.date.getTime() - now.getTime();
                                                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                                            if (diffDays <= 3) isDanger = true;
                                                        }
                                                        
                                                        return (
                                                            <div className="flex flex-col items-center justify-center w-full relative">
                                                                
                                                                <span className={`font-bold ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-800' : 'text-gray-400 dark:text-gray-400'} uppercase tracking-widest transition-all duration-500 ${isScrolled ? 'text-[10px] mb-0.5' : 'text-sm mb-2'}`}>
                                                                    Total Hutang
                                                                </span>
                                                                <div className={`flex items-start justify-center ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-900 dark:text-white'} transition-all duration-500 ${isScrolled ? 'mb-0' : 'mb-6'}`}>
                                                                    <span className={`font-medium transition-all duration-500 ${isScrolled ? 'text-xs mt-1 mr-1' : 'text-xl mt-3 mr-1'}`}>Rp</span>
                                                                    <span className={`font-bold tracking-tight leading-none transition-all duration-500 ${isScrolled ? 'text-3xl' : 'text-[clamp(2.2rem,11vw,4.5rem)]'}`}>
                                                                        <AnimatedNumber value={debtProgress.remaining} formatFn={formatNumber} />
                                                                    </span>
                                                                </div>

                                                                <div className={`overflow-hidden transition-all duration-500 flex justify-center items-center gap-2 ${
                                                                    isScrolled ? 'max-h-0 opacity-0 mb-0' : 'max-h-20 opacity-100 mb-8'
                                                                }`}>
                                                                    <div className={`text-sm font-semibold px-4 py-1.5 rounded-full flex items-center shadow-sm transition-colors ${
                                                                        isDanger ? `bg-red-50/80 dark:bg-red-900/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-800/50 animate-pulse ${isGlass ? 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : 'backdrop-blur-md'}` : `${uiStyle.cardSoft}`
                                                                    }`}>
                                                                        <span className="truncate max-w-[220px]">{nearestBadgeText}</span>
                                                                    </div>
                                                                    <button onClick={(e) => { e.stopPropagation(); setIsAddDebtModalOpen(true); }} className={`p-2 rounded-full hover:opacity-80 transition-colors shadow-sm shrink-0 ${uiStyle.cardSoft}`}>
                                                                        <Plus className="w-4 h-4" strokeWidth={3} />
                                                                    </button>
                                                                </div>
                                                                
                                                                <div 
                                                                    className={`relative w-full border-[3px] ring-1 transition-all duration-500 ease-in-out cursor-pointer ${
                                                                        totalDebtPct === 0 ? 'border-green-600 dark:border-green-500 animate-pulse bg-green-50 dark:bg-green-900/20 ring-green-200 dark:ring-green-900/50' : (isGlass ? 'border-white/50 dark:border-white/10 ring-white/20 dark:ring-white/5' : 'border-white dark:border-gray-900 ring-gray-200 dark:ring-gray-700')
                                                                    } ${isScrolled ? 'h-6 rounded-md mb-1' : 'h-14 rounded-xl mb-3'} ${isGlass ? 'bg-white/20 dark:bg-black/20' : 'bg-gray-200 dark:bg-gray-800'}`}
                                                                    onClick={() => setIsDebtExpanded(!isDebtExpanded)}
                                                                >
                                                                    <div className={`absolute inset-0 overflow-hidden transition-all duration-500 ${isScrolled ? 'rounded-[4px]' : 'rounded-[9px]'}`}>
                                                                        <div className={`h-full transition-all relative z-0`} style={{ width: `${totalDebtPct}%`, backgroundColor: getProgressColor(totalDebtPct) }}>
                                                                            <div className="absolute inset-0 bg-white/30 dark:bg-white/10 animate-breathe"></div>
                                                                        </div>
                                                                    </div>

                                                                    <div className={`absolute inset-0 flex items-center justify-between z-10 pointer-events-none transition-all duration-500 ${
                                                                        isScrolled ? 'px-2' : 'px-4'
                                                                    }`}>
                                                                        <span className={`font-bold transition-all duration-500 flex items-center ${
                                                                            totalDebtPct < 40 && totalDebtPct > 0 ? (isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-800 dark:text-gray-200') : totalDebtPct === 0 ? 'text-green-500' : 'text-white/90'
                                                                        } ${isScrolled ? 'text-[10px]' : 'text-sm'}`}>
                                                                            {totalDebtPct.toFixed(0)}% Sisa 
                                                                            {!isScrolled && <ChevronDown className={`w-4 h-4 ml-1 transition-transform ${isDebtExpanded ? 'rotate-180' : ''}`} />}
                                                                        </span>
                                                                    </div>
                                                                </div>

                                                                <div className={`w-full overflow-hidden transition-all duration-300 ${isDebtExpanded && !isScrolled ? 'max-h-[50vh] opacity-100 mt-2' : 'max-h-0 opacity-0 mt-0'}`}>
                                                                    <div className="overflow-y-auto max-h-[45vh] pb-2 space-y-1.5 px-1">
                                                                        {debtProgress.list.map(debt => {
                                                                            const pct = Math.max(0, Math.min(100, ((debt.amount - debt.paid) / debt.amount) * 100));
                                                                            const isSelected = selectedDebtId === debt.id;
                                                                            return (
                                                                                <div 
                                                                                    key={debt.id} 
                                                                                    onClick={() => setSelectedDebtId(debt.id)}
                                                                                    className={`cursor-pointer transition-all flex items-center justify-between gap-3 p-2.5 rounded-xl border-2 ${isSelected ? `border-gray-400 dark:border-gray-500 shadow-md ${uiStyle.cardSoft}` : 'border-transparent hover:bg-black/5 dark:hover:bg-white/5'}`}
                                                                                >
                                                                                    <span className={`font-bold text-[13px] truncate shrink-0 max-w-[50%] ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-800 dark:text-gray-200'}`}>{debt.name}</span>
                                                                                    <div className={`flex-1 h-2 rounded-full overflow-hidden shrink-0 ${isGlass ? 'bg-black/10 dark:bg-white/10' : 'bg-gray-200 dark:bg-gray-700'}`}>
                                                                                        <div className={`h-full transition-all duration-500 rounded-full`} style={{ width: `${pct}%`, backgroundColor: getProgressColor(pct) }}></div>
                                                                                    </div>
                                                                                    {pct <= 0 && <span className="text-[10px] font-semibold text-green-600 dark:text-green-400 shrink-0">✅ Lunas</span>}
                                                                                </div>
                                                                            )
                                                                        })}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })()}
                                                </div>
                                                {!isGlass && (
                                                    <div className={`absolute top-full left-0 w-full h-8 bg-gradient-to-b from-white/95 dark:from-[#171717]/95 to-transparent pointer-events-none transition-opacity duration-500 ${isScrolled ? 'opacity-100' : 'opacity-0'}`}></div>
                                                )}

                                                {/* ISOLATED SCROLLABLE LIST PORTION */}
                                                <div className="flex-1 min-h-0 overflow-y-auto px-5" onScroll={handleHomeScroll}>
                                                    {Object.keys(groupedExpenses).length === 0 ? (
                                                    <div className={`text-center py-10 flex flex-col items-center ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-600' : 'text-gray-400 dark:text-gray-500'}`}>
                                                        <p className="font-semibold text-sm">Belum ada {activeTab === 'spending' ? 'pengeluaran' : 'pembayaran hutang'}.</p>
                                                    </div>
                                                    ) : (
                                                    <div className="pb-6">
                                                        {Object.entries(groupedExpenses).map(([dateStr, dayExpenses]) => (
                                                        <div key={dateStr} className="mb-6 relative">
                                                            <div className="py-1 mb-2">
                                                            <span className={`text-[11px] font-bold uppercase tracking-widest ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'}`}>{dateStr}</span>
                                                            </div>
                                                            
                                                            <div className="space-y-3 mt-1">
                                                            {dayExpenses.map((expense) => {
                                                                const pctNum = activeTab === 'spending' ? parseFloat(((expense.amount / budget) * 100).toFixed(1)) : 0;
                                                                const isDebtAdd = expense.type === 'debt_added';
                                                                
                                                                return (
                                                                <div key={expense.id} className={`group flex items-center py-2 px-3 rounded-xl relative animate-in fade-in duration-300 ${isGlass ? 'bg-white/30 dark:bg-black/40 border border-white/40 dark:border-white/20 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : ''}`}>
                                                                    {appSettings.showTime && (
                                                                    <div className="flex-shrink-0 mr-2 opacity-60" title={new Date(expense.date).toLocaleTimeString()}>
                                                                        {getTimeIcon(expense.date)}
                                                                    </div>
                                                                    )}
                                                                    <div className={`text-[15px] font-medium ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-800 dark:text-gray-200'}`}>
                                                                        {isDebtAdd ? `Hutang Baru: ${expense.description.replace('Hutang Baru: ', '')}` : expense.description}
                                                                    </div>
                                                                    <div className={`flex-1 border-b border-dashed mx-3 opacity-40 ${isGlass && appSettings.themeLuminance === 'light' ? 'border-gray-500' : 'border-gray-300 dark:border-gray-600'}`}></div>
                                                                    <div className="flex items-center">
                                                                        <span className={`text-[11px] mr-0.5 ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'}`}>Rp</span>
                                                                        <span className={`text-[15px] font-bold tracking-tight ${activeTab === 'spending' ? 'mr-2' : ''} ${isGlass && appSettings.themeLuminance === 'light' ? 'text-black' : 'text-gray-900 dark:text-white'}`}>
                                                                            {isDebtAdd ? '+' : (activeTab === 'income' ? '+' : '-')} {formatNumber(expense.amount)}
                                                                        </span>
                                                                        {activeTab === 'spending' && (
                                                                        <div className="bg-red-100/80 dark:bg-red-900/40 px-1.5 py-0.5 rounded flex items-center justify-center min-w-[34px] ml-2">
                                                                            <span className="text-[10px] font-bold text-red-800 dark:text-red-300">
                                                                                {pctNum}%
                                                                            </span>
                                                                        </div>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                                );
                                                            })}
                                                            </div>
                                                        </div>
                                                        ))}
                                                    </div>
                                                    )}
                                                </div>

                                                {/* FIXED INPUT FIELD PORTION */}
                                                <div className="w-full shrink-0 z-50 flex flex-col items-center bg-transparent" style={{ paddingBottom: 'max(24px, env(safe-area-inset-bottom))', paddingTop: '8px' }}>
                                                    {appSettings.allowPastInput && (
                                                        <div className="w-[90%] mb-1.5 flex justify-start animate-in slide-in-from-bottom-2">
                                                            <input 
                                                                type="date"
                                                                value={customExpenseDate}
                                                                max={new Date(new Date() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 10)}
                                                                onChange={(e) => setCustomExpenseDate(e.target.value)}
                                                                className={`px-3 py-1.5 rounded-lg text-xs font-semibold outline-none shadow-sm transition-all cursor-pointer ${isGlass ? 'bg-white/30 dark:bg-black/40 text-gray-900 dark:text-white border border-white/40 dark:border-white/20 backdrop-blur-md' : 'bg-white dark:bg-[#171717] border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200'}`}
                                                            />
                                                        </div>
                                                    )}
                                                    <form onSubmit={handleAddExpense} className={`flex px-4 py-2.5 items-center rounded-full pointer-events-auto w-[90%] transition-all duration-300 ${uiStyle.capsule}`}>
                                                        <input
                                                            type="text"
                                                            value={descInput}
                                                            onChange={(e) => setDescInput(e.target.value)}
                                                            placeholder={activeTab === 'spending' ? "Buat apa uangnya?" : (selectedDebtId ? "Catatan (opsional)" : "Pilih hutang di atas dulu")}
                                                            className={`flex-1 min-w-0 bg-transparent border-none text-[16px] font-medium outline-none focus:ring-0 p-0 ${isGlass && appSettings.themeLuminance === 'light' ? 'text-black placeholder-gray-600' : 'text-gray-800 dark:text-white placeholder-gray-500 dark:placeholder-gray-400'}`}
                                                            required={activeTab !== 'debt'}
                                                            disabled={activeTab === 'debt' && !selectedDebtId}
                                                        />
                                                        
                                                        <div className={`w-px h-6 mx-3 shrink-0 ${uiStyle.divider}`}></div>
                                                        <input
                                                            type="text"
                                                            value={amountInput}
                                                            onChange={(e) => {
                                                                const rawValue = e.target.value.replace(/\D/g, '');
                                                                setAmountInput(rawValue ? parseInt(rawValue).toLocaleString('id-ID') : '');
                                                            }}
                                                            placeholder="Berapa?"
                                                            className={`w-20 sm:w-24 bg-transparent border-none text-[16px] font-bold outline-none focus:ring-0 p-0 text-right mr-3 shrink-0 ${isGlass && appSettings.themeLuminance === 'light' ? 'text-black placeholder-gray-600' : 'text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400'}`}
                                                            required
                                                            disabled={activeTab === 'debt' && !selectedDebtId}
                                                        />
                                                        <button 
                                                            type="submit"
                                                            disabled={!amountInput || (activeTab !== 'debt' && !descInput.trim()) || (activeTab === 'debt' && !selectedDebtId)}
                                                            className={`text-white rounded-full w-10 h-10 flex items-center justify-center transition-transform active:scale-90 disabled:opacity-30 disabled:active:scale-100 shrink-0 shadow-sm ${activeTab === 'spending' ? 'bg-red-600 hover:bg-red-700 theme-bg' : 'bg-gray-900 hover:bg-black dark:bg-gray-100 dark:hover:bg-white dark:text-gray-900 theme-bg'}`}
                                                        >
                                                            {activeTab === 'spending' && <TrendingDown className="w-5 h-5" strokeWidth={2.5} />}
                                                            {activeTab === 'debt' && <Wallet className="w-5 h-5" strokeWidth={2.5} />}
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>
                                        </>
                                    );
                                })()}
                            </div>

                            {/* ===================== CALENDAR PANE ===================== */}
                            <div className={`w-1/2 h-full flex flex-col relative overflow-hidden shadow-[inset_10px_0_20px_-10px_rgba(0,0,0,0.05)] transition-colors duration-300 ${uiStyle.paneCalendar}`}>
                                <div className={`flex-1 flex flex-col min-h-0 ${isGlass ? 'bg-white/20 dark:bg-black/40 backdrop-blur-2xl' : 'bg-white dark:bg-[#171717]'}`}>
                                    <div className={`shrink-0 flex items-center justify-between px-4 pt-6 pb-4 z-10 transition-colors duration-300 bg-transparent`}>
                                        <div className="flex items-center">
                                            <button 
                                                onClick={() => setCurrentView('home')} 
                                                className={`p-2 -ml-2 rounded-full transition-colors ${isGlass ? (appSettings.themeLuminance === 'light' ? 'text-gray-800 hover:bg-black/10' : 'text-white hover:bg-white/20') : 'text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white bg-gray-100 dark:bg-[#262626]'}`}
                                            >
                                                <ChevronLeft className="w-6 h-6" />
                                            </button>
                                            <div className="ml-3">
                                                <h2 className={`text-lg font-bold whitespace-nowrap ${isGlass && appSettings.themeLuminance === 'light' ? 'text-black' : 'text-gray-900 dark:text-white'}`}>{calendarData.monthName}</h2>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-1">
                                            <button onClick={() => changeMonth(-1)} disabled={isStartMonth()} className={`p-2 rounded-full transition-colors ${isStartMonth() ? 'opacity-50 cursor-not-allowed' : ''} ${isGlass ? (appSettings.themeLuminance === 'light' ? 'text-gray-800 hover:bg-black/10' : 'text-white hover:bg-white/20') : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:bg-[#262626]'}`}><ChevronUp className="w-5 h-5" /></button>
                                            <button onClick={() => changeMonth(1)} className={`p-2 rounded-full transition-colors ${isGlass ? (appSettings.themeLuminance === 'light' ? 'text-gray-800 hover:bg-black/10' : 'text-white hover:bg-white/20') : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:bg-[#262626]'}`}><ChevronDown className="w-5 h-5" /></button>
                                            <div className={`w-px h-5 mx-1 ${uiStyle.divider}`}></div>
                                            <button onClick={() => setIsSettingsOpen(true)} className={`p-2 rounded-full transition-colors ${isGlass ? (appSettings.themeLuminance === 'light' ? 'text-gray-800 hover:bg-black/10' : 'text-white hover:bg-white/20') : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:bg-[#262626]'}`}>
                                                <SettingsIcon className="w-5 h-5" />
                                            </button>
                                        </div>
                                    </div>

                                    <div 
                                        className={`flex-1 min-h-0 overflow-y-auto p-5 pb-36 transition-all duration-150 ${isAnimatingMonth ? `opacity-0 ${monthAnimDir > 0 ? '-translate-y-4' : 'translate-y-4'}` : 'opacity-100 translate-y-0'}`}
                                        onTouchEnd={(e) => {
                                            e.stopPropagation(); 
                                            onCalendarTouchEnd(e);
                                        }}
                                    >
                                        <div className="mb-8 flex flex-col items-center justify-center text-center">
                                            <p className={`text-xs font-bold uppercase tracking-widest mb-1 ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'}`}>Total {activeTab === 'spending' ? 'Pengeluaran' : 'Pembayaran Hutang'} Bulan Ini</p>
                                            <p className={`text-3xl font-bold tracking-tight ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-900 dark:text-white'}`}>-Rp {formatNumber(calendarData.totalSpentMonth)}</p>
                                        </div>

                                        <div className="grid grid-cols-5 gap-2">
                                            {calendarData.days.map((dayObj, i) => {
                                                const targetBudget = parseInt(userProfile.promiseBudget) || 0;
                                                const isSpending = activeTab === 'spending';
                                                let bgClass = '';
                                                let textClass = '';
                                                let showData = false;

                                                if (dayObj.isFuture || dayObj.isBeforeStart) {
                                                    bgClass = isGlass ? 'bg-white/10 dark:bg-black/20 border-transparent opacity-50 shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)]' : 'bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-700 opacity-50';
                                                    textClass = isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-600' : 'text-gray-500 dark:text-gray-400';
                                                } else {
                                                    showData = true;
                                                    if (dayObj.dailyExpense <= targetBudget || !isSpending) {
                                                        if (!isSpending) {
                                                            bgClass = isGlass ? 'bg-gray-500/20 border-gray-400/30 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : 'bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-700';
                                                            textClass = 'text-gray-900 dark:text-white';
                                                        } else {
                                                            bgClass = isGlass ? 'bg-green-500/30 dark:bg-green-500/30 border-green-400/40 dark:border-green-400/30 theme-bg-light theme-border shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : 'bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-800 theme-bg-light theme-border';
                                                            textClass = 'text-gray-900 dark:text-white theme-text';
                                                        }
                                                    } else {
                                                        bgClass = isGlass ? 'bg-red-500/30 dark:bg-red-500/30 border-red-400/40 dark:border-red-400/30 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)]' : 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800';
                                                        textClass = 'text-gray-900 dark:text-white';
                                                    }
                                                }

                                                return (
                                                    <div 
                                                        key={i} 
                                                        onClick={() => showData && setSelectedDateReceipt(dayObj)}
                                                        className={`flex flex-col items-center justify-center p-2 rounded-xl border ${
                                                        dayObj.isToday ? 'ring-2 ring-blue-400 theme-ring ring-offset-1 dark:ring-offset-gray-950' : ''
                                                        } ${bgClass} ${showData ? 'cursor-pointer active:scale-95 transition-transform' : ''} aspect-square relative`}
                                                    >
                                                        <span className={`absolute top-1.5 left-2 text-[10px] font-bold ${textClass}`}>
                                                            {dayObj.day}
                                                        </span>
                                                        {showData && (
                                                            <div className="mt-3 flex flex-col items-center leading-tight">
                                                                {dayObj.dailyExpense > 0 && <span className={`text-[10px] sm:text-[11px] font-bold tracking-tight ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-900' : 'text-gray-900 dark:text-white'}`}>-{formatCompact(dayObj.dailyExpense)}</span>}
                                                                {dayObj.dailyDebtAdded > 0 && <span className={`text-[10px] sm:text-[11px] font-bold tracking-tight text-red-600 dark:text-red-400`}>+{formatCompact(dayObj.dailyDebtAdded)}</span>}
                                                                {dayObj.dailyExpense === 0 && dayObj.dailyDebtAdded === 0 && <span className={`text-[11px] font-bold tracking-tight ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-600' : 'text-gray-500 dark:text-gray-400'}`}>0</span>}
                                                            </div>
                                                        )}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* ADD DEBT MODAL OVERLAY */}
                        {isAddDebtModalOpen && (
                            <div className={`fixed inset-0 z-[110] flex items-center justify-center p-6 animate-in fade-in duration-200 ${isGlass ? 'bg-black/20 backdrop-blur-md' : 'bg-black/40 dark:bg-black/60'}`} onClick={() => setIsAddDebtModalOpen(false)}>
                                <div className={`w-full max-w-sm rounded-3xl overflow-hidden flex flex-col p-6 ${uiStyle.modalFrosted}`} onClick={e => e.stopPropagation()}>
                                    <h3 className={`font-bold text-xl mb-4 text-center ${isGlass && appSettings.themeLuminance === 'light' ? 'text-black' : 'text-gray-900 dark:text-white'}`}>Tambah Hutang Baru</h3>
                                    
                                    <div className={`flex mb-4 p-1 rounded-xl ${isGlass ? 'bg-black/20 dark:bg-white/10' : 'bg-gray-100 dark:bg-[#262626]'}`}>
                                        <button type="button" onClick={() => setNewDebtType('tagihan')} className={`flex-1 py-2 text-sm font-semibold rounded-lg capitalize transition-colors ${newDebtType === 'tagihan' ? (isGlass ? 'bg-white/40 dark:bg-black/40 text-gray-900 dark:text-white shadow-sm' : 'bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm') : 'text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'}`}>Tagihan (Sekali Bayar)</button>
                                        <button type="button" onClick={() => setNewDebtType('cicilan')} className={`flex-1 py-2 text-sm font-semibold rounded-lg capitalize transition-colors ${newDebtType === 'cicilan' ? (isGlass ? 'bg-white/40 dark:bg-black/40 text-gray-900 dark:text-white shadow-sm' : 'bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm') : 'text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'}`}>Cicilan (Bulanan)</button>
                                    </div>

                                    <form onSubmit={handleAddDebtPrincipal} className="space-y-4">
                                        <input
                                            type="text"
                                            value={newDebtName}
                                            onChange={(e) => setNewDebtName(e.target.value)}
                                            placeholder="Ke siapa/Untuk apa? (mis. Bank BCA)"
                                            className={`w-full px-4 py-3 rounded-xl outline-none text-[16px] text-gray-900 dark:text-white ${uiStyle.input}`}
                                            required
                                        />
                                        <div className="relative">
                                            <span className={`absolute left-4 top-1/2 -translate-y-1/2 font-bold ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-600' : 'text-gray-500 dark:text-gray-400'}`}>Rp</span>
                                            <input
                                                type="text"
                                                value={newDebtAmount}
                                                onChange={(e) => {
                                                    const rawValue = e.target.value.replace(/\D/g, '');
                                                    setNewDebtAmount(rawValue ? parseInt(rawValue).toLocaleString('id-ID') : '');
                                                }}
                                                placeholder="Total Nominal Hutang"
                                                className={`w-full pl-12 pr-4 py-3 rounded-xl outline-none text-[16px] font-semibold text-gray-900 dark:text-white ${uiStyle.input}`}
                                                required
                                            />
                                        </div>

                                        {newDebtType === 'tagihan' && (
                                            <div>
                                                <span className={`text-xs font-semibold mb-1 block ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'}`}>Tenggat Waktu Pembayaran (Deadline)</span>
                                                <input
                                                    type="date"
                                                    value={newDebtDeadline}
                                                    onChange={(e) => setNewDebtDeadline(e.target.value)}
                                                    className={`w-full px-4 py-3 rounded-xl outline-none text-[16px] text-gray-900 dark:text-white ${uiStyle.input}`}
                                                    required
                                                />
                                            </div>
                                        )}

                                        {newDebtType === 'cicilan' && (
                                            <div className="flex gap-2">
                                                <div className="flex-1">
                                                    <span className={`text-xs font-semibold mb-1 block ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'}`}>Mulai Cicilan</span>
                                                    <input
                                                        type="date"
                                                        value={newDebtStartDate}
                                                        onChange={(e) => setNewDebtStartDate(e.target.value)}
                                                        className={`w-full px-3 py-3 rounded-xl outline-none text-[16px] text-gray-900 dark:text-white ${uiStyle.input}`}
                                                        required
                                                    />
                                                </div>
                                                <div className="w-1/3">
                                                    <span className={`text-xs font-semibold mb-1 block ${isGlass && appSettings.themeLuminance === 'light' ? 'text-gray-700' : 'text-gray-500 dark:text-gray-400'}`}>Berapa Bulan?</span>
                                                    <input
                                                        type="number"
                                                        min="1"
                                                        placeholder="Bulan"
                                                        value={newDebtTenor}
                                                        onChange={(e) => setNewDebtTenor(e.target.value)}
                                                        className={`w-full px-3 py-3 rounded-xl outline-none text-[16px] text-center text-gray-900 dark:text-white ${uiStyle.input}`}
                                                        required
                                                    />
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex gap-3 pt-2">
                                            <button type="button" onClick={() => setIsAddDebtModalOpen(false)} className={`flex-1 py-3 rounded-xl font-bold ${uiStyle.cardSoft}`}>Batal</button>
                                            <button type="submit" disabled={!newDebtAmount || !newDebtName.trim()} className="flex-1 py-3 bg-gray-900 hover:bg-black dark:bg-gray-100 dark:hover:bg-white dark:text-gray-900 theme-bg text-white rounded-xl font-bold disabled:opacity-50 shadow-md">Simpan</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* RECEIPT MODAL */}
                        {selectedDateReceipt && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-in fade-in duration-200 drop-shadow-2xl bg-black/60" onClick={() => setSelectedDateReceipt(null)}>
                                <div className="w-full max-w-sm" onClick={e => e.stopPropagation()}>
                                    <div className="receipt-mask w-full flex flex-col max-h-[80vh] bg-white">
                                        <div className="p-5 border-b border-dashed shrink-0 rounded-t-xl border-gray-300">
                                            <h3 className="text-center font-bold uppercase tracking-widest text-lg text-gray-900">List {activeTab === 'spending' ? 'Pengeluaran' : 'Hutang'}</h3>
                                            <p className="text-center text-xs mt-1 font-semibold text-gray-600">{selectedDateReceipt.dateStr}</p>
                                        </div>
                                        <div className="p-5 flex-1 overflow-y-auto">
                                            {(() => {
                                                const activeType = activeTab === 'spending' ? 'expense' : activeTab;
                                                const dayExps = expenses.filter(exp => 
                                                    (exp.type === activeType || exp.type === 'debt_added') && 
                                                    new Date(exp.date).toDateString() === new Date(new Date().getFullYear(), new Date().getMonth() + currentMonthOffset, selectedDateReceipt.day).toDateString()
                                                );
                                                return (
                                                    <div className="space-y-3">
                                                        {dayExps.map(exp => (
                                                            <div key={exp.id} className="flex justify-between items-center text-sm">
                                                                <span className="font-medium text-gray-800">{exp.type === 'debt_added' ? `Hutang Baru: ${exp.description.replace('Hutang Baru: ', '')}` : exp.description}</span>
                                                                <span className="font-bold text-gray-900">
                                                                    {exp.type === 'debt_added' ? '+' : '-'}Rp {formatNumber(exp.amount)}
                                                                </span>
                                                            </div>
                                                        ))}
                                                        {dayExps.length === 0 && <p className="text-center text-sm italic text-gray-500">Tidak ada transaksi.</p>}
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                        <div className="p-5 pt-0 shrink-0">
                                            <div className="border-t pt-4 flex justify-between font-bold text-sm border-gray-300">
                                                <span className="text-gray-700">Total {activeTab === 'spending' ? 'Pengeluaran' : 'Hutang'}</span>
                                                <span className="text-gray-900">-Rp {formatNumber(selectedDateReceipt.dailyExpense)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS / EDIT MODAL */}
                        {isSettingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 dark:bg-black/60 backdrop-blur-sm overflow-hidden" onClick={() => { setIsSettingsOpen(false); setIsEditMode(false); }}>
                            
                            <div className="w-full max-w-sm flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-8 duration-300 max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                
                                <div className="flex justify-between items-center px-2 shrink-0">
                                    <h2 className="text-2xl font-bold text-white drop-shadow-md">{isEditMode ? 'Edit Data' : 'Pengaturan'}</h2>
                                    <button onClick={() => { setIsSettingsOpen(false); setIsEditMode(false); }} className="p-2 bg-white/20 rounded-full text-white hover:bg-white/30 transition-colors">
                                        <XIcon className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto no-scrollbar pb-4 space-y-6" style={{ WebkitOverflowScrolling: 'touch' }}>
                                    
                                    {/* HIDE ID CARD & INSTALL BUTTON IF EDIT MODE TO MAXIMIZE SPACE ON IOS */}
                                    {!isEditMode && (
                                        <>
                                            {/* ID CARD MODULE */}
                                            <div className="bg-white dark:bg-[#171717] rounded-3xl p-5 shadow-2xl flex flex-col gap-4 border border-gray-100 dark:border-gray-800 relative">
                                                <button 
                                                    onClick={() => setShowLogoutConfirm(true)}
                                                    className="absolute top-4 right-4 p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-colors z-20"
                                                    title="Log Out"
                                                >
                                                    <LogOutIcon className="w-5 h-5" />
                                                </button>
                                                <div className="flex items-center mt-2">
                                                    <div className="flex-1 pr-4 z-10">
                                                        <h3 className="font-bold text-gray-900 dark:text-white text-xl uppercase tracking-wide">
                                                            {userProfile.name}
                                                        </h3>
                                                        <p className="text-gray-600 dark:text-gray-400 text-sm font-semibold mb-2">
                                                            {userProfile.age} Tahun
                                                        </p>
                                                        <input 
                                                            type="text"
                                                            defaultValue={userProfile.quote}
                                                            onBlur={(e) => handleUpdateProfile({quote: e.target.value})}
                                                            className="w-full bg-transparent text-gray-500 dark:text-gray-500 text-[10px] font-medium italic leading-snug border-l-2 border-gray-300 dark:border-gray-700 pl-2 outline-none focus:border-blue-500"
                                                            placeholder="Tulis motomu..."
                                                        />
                                                    </div>
                                                    <label className="w-[60px] h-[80px] rounded-lg flex items-center justify-center text-4xl shadow-sm z-10 shrink-0 bg-gray-100 dark:bg-[#262626] border border-gray-200 dark:border-gray-700 cursor-pointer overflow-hidden relative group">
                                                        {userProfile.avatar ? (
                                                            <img src={userProfile.avatar} className="w-full h-full object-cover" />
                                                        ) : (
                                                            userProfile.gender === 'male' ? '👨' : '👩'
                                                        )}
                                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <CameraIcon className="w-5 h-5 text-white" />
                                                        </div>
                                                        <input type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload} />
                                                    </label>
                                                </div>
                                            </div>

                                            {/* INSTALL / UPDATE BUTTON */}
                                            <div className="w-full shrink-0 z-10">
                                                {!isStandalone ? (
                                                    <button 
                                                        onClick={handleInstallApp}
                                                        className="w-full flex items-center justify-center gap-2 py-4 bg-gradient-to-r from-blue-600 to-blue-500 text-white rounded-3xl font-bold shadow-lg hover:from-blue-700 hover:to-blue-600 transition-all"
                                                    >
                                                        <DownloadIcon className="w-5 h-5" /> Install Wang
                                                    </button>
                                                ) : (
                                                    <button 
                                                        onClick={handleForceUpdate}
                                                        className="w-full flex items-center justify-center gap-2 py-4 bg-gradient-to-r from-green-600 to-green-500 text-white rounded-3xl font-bold shadow-lg hover:from-green-700 hover:to-green-600 transition-all"
                                                    >
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 
                                                        Check for Update
                                                    </button>
                                                )}
                                            </div>
                                        </>
                                    )}

                                    {/* SETTINGS MODULES */}
                                    <div className={`bg-white dark:bg-[#171717] rounded-3xl p-6 shadow-2xl flex flex-col border border-gray-100 dark:border-gray-800 ${isEditMode ? 'min-h-[50vh]' : 'gap-8'}`}>
                                        
                                        {isEditMode ? (
                                            <div className="flex flex-col h-full min-h-0">
                                                <div className="shrink-0 mb-4 pb-3 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
                                                    <button onClick={() => setIsEditMode(false)} className="text-blue-600 dark:text-blue-400 text-sm font-semibold flex items-center hover:opacity-80">
                                                        <ChevronLeft className="w-4 h-4 mr-1"/> Kembali
                                                    </button>
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                        {editModeType === 'spending' ? 'Pengeluaran' : 'Hutang'}
                                                    </span>
                                                </div>
                                                <div className="flex flex-col space-y-3 pr-1 pb-4">
                                                    {expenses.filter(e => editModeType === 'spending' ? e.type === 'expense' : (e.type === 'debt' || e.type === 'debt_added')).map(exp => (
                                                        <div key={exp.id} className="flex gap-2 items-center p-2.5 rounded-xl bg-gray-100 dark:bg-[#262626] border border-gray-200 dark:border-gray-700 shrink-0">
                                                            <input 
                                                                defaultValue={exp.description} 
                                                                onBlur={(e) => handleEditExpense(exp.id, 'description', e.target.value)} 
                                                                className="flex-1 min-w-0 rounded-lg px-3 py-2 text-[15px] bg-white dark:bg-[#171717] border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
                                                            />
                                                            <input 
                                                                defaultValue={exp.amount} 
                                                                onBlur={(e) => handleEditExpense(exp.id, 'amount', parseInt(e.target.value.replace(/\D/g, '')) || 0)} 
                                                                className="w-24 shrink-0 px-3 py-2 rounded-lg text-[15px] font-semibold text-right bg-white dark:bg-[#171717] border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
                                                            />
                                                            <button onClick={() => handleDeleteExpense(exp.id)} className="p-2 text-red-500 hover:bg-red-500/20 rounded-lg transition-colors shrink-0">
                                                                <Trash2 className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                    {expenses.filter(e => editModeType === 'spending' ? e.type === 'expense' : (e.type === 'debt' || e.type === 'debt_added')).length === 0 && <p className="text-center text-gray-500 dark:text-gray-400 text-sm mt-8 italic">Data transaksi kosong</p>}
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="space-y-3">
                                                    <h3 className="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest border-b border-gray-100 dark:border-gray-800 pb-2">Pengaturan Umum</h3>
                                                    
                                                    <div className="pt-2">
                                                        <span className="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-2 block">Tema Aplikasi</span>
                                                        <div className="grid grid-cols-4 gap-2">
                                                            {[
                                                                { id: 'system', label: 'Auto', icon: <SystemIcon className="w-5 h-5 mb-1.5" /> },
                                                                { id: 'light', label: 'Light', icon: <Sun className="w-5 h-5 mb-1.5" /> },
                                                                { id: 'dark', label: 'Dark', icon: <Moon className="w-5 h-5 mb-1.5" /> },
                                                                { id: 'custom', label: 'Custom', icon: <ImageIcon className="w-5 h-5 mb-1.5" /> }
                                                            ].map(t => (
                                                                <button 
                                                                    key={t.id}
                                                                    onClick={() => setAppSettings({...appSettings, themeMode: t.id})}
                                                                    className={`flex flex-col items-center justify-center py-3 rounded-xl transition-all border ${appSettings.themeMode === t.id ? 'bg-blue-50 border-blue-200 text-blue-600 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-400 shadow-sm' : 'bg-gray-50 border-transparent text-gray-500 hover:bg-gray-100 dark:bg-[#262626] dark:text-gray-400 dark:hover:bg-[#404040]'}`}
                                                                >
                                                                    {t.icon}
                                                                    <span className="text-[10px] font-bold uppercase tracking-wider">{t.label}</span>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    
                                                    {appSettings.themeMode === 'custom' && (
                                                    <div className="animate-in fade-in slide-in-from-top-2 pt-2">
                                                        <span className="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-2 block">Wallpaper Custom</span>
                                                        <label className={`flex items-center justify-center w-full py-3 border-2 border-dashed ${appSettings.customThemeImage ? 'border-green-400/50 bg-green-50 dark:bg-green-900/20 text-gray-800 dark:text-white' : 'border-gray-300 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-[#262626] text-gray-600 dark:text-gray-400'} rounded-xl cursor-pointer transition-colors`}>
                                                            <ImageIcon className={`w-5 h-5 mr-2 ${appSettings.customThemeImage ? 'text-green-700 dark:text-green-400' : ''}`} />
                                                            <span className={`text-sm font-medium ${appSettings.customThemeImage ? 'text-green-800 dark:text-green-300' : ''}`}>
                                                                {appSettings.customThemeImage ? 'Wallpaper Aktif' : 'Upload Wallpaper'}
                                                            </span>
                                                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                                        </label>
                                                        {appSettings.customThemeImage && (
                                                            <button onClick={() => setAppSettings({...appSettings, customTheme: null, customThemeImage: null, themeLuminance: null})} className="text-xs text-red-500 hover:text-red-600 mt-2 font-medium w-full text-center">Hapus Wallpaper</button>
                                                        )}
                                                    </div>
                                                    )}

                                                    <div className="pt-2">
                                                        <span className="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-2 block">Modul Pelacakan & Default Tab</span>
                                                        <div className="grid grid-cols-2 gap-3 mt-2">
                                                            {[
                                                                {id: 'spending', label: 'Pengeluaran', icon: <TrendingDown className="w-5 h-5"/>}, 
                                                                {id: 'debt', label: 'Hutang', icon: <Wallet className="w-5 h-5"/>}
                                                            ].map(item => (
                                                                <div 
                                                                    key={item.id} 
                                                                    className={`relative flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all cursor-pointer ${userProfile.trackedItems?.includes(item.id) ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#262626] text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-[#404040]'}`} 
                                                                    onClick={() => {
                                                                        let newItems = userProfile.trackedItems ? [...userProfile.trackedItems] : [];
                                                                        if (newItems.includes(item.id)) newItems = newItems.filter(i => i !== item.id);
                                                                        else newItems.push(item.id);
                                                                        if (newItems.length === 0) newItems = ['spending'];
                                                                        const newDefault = newItems.includes(userProfile.defaultTab) ? userProfile.defaultTab : newItems[0];
                                                                        setUserProfile({...userProfile, trackedItems: newItems, defaultTab: newDefault});
                                                                        handleUpdateProfile({trackedItems: newItems, defaultTab: newDefault});
                                                                    }}
                                                                >
                                                                    {item.icon}
                                                                    <span className="text-[11px] font-bold mt-1.5">{item.label}</span>
                                                                    
                                                                    {userProfile.trackedItems?.includes(item.id) && (
                                                                        <button 
                                                                            onClick={(e) => { 
                                                                                e.stopPropagation(); 
                                                                                handleUpdateProfile({defaultTab: item.id}); 
                                                                                setUserProfile(prev => ({...prev, defaultTab: item.id}));
                                                                            }}
                                                                            className={`absolute top-2 right-2 p-1.5 rounded-full transition-colors ${userProfile.defaultTab === item.id ? 'bg-blue-500 text-white shadow-sm' : 'bg-blue-100 dark:bg-blue-800 text-blue-400 hover:bg-blue-200 dark:hover:bg-blue-700'}`}
                                                                            title="Set as Default Tab"
                                                                        >
                                                                            <HomeIcon className="w-3 h-3" />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="pt-2 space-y-2">
