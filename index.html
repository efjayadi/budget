                                                        <label className="flex items-center justify-between p-3 rounded-xl cursor-pointer bg-gray-50 dark:bg-[#262626] border border-gray-200 dark:border-gray-700">
                                                            <span className="text-sm font-semibold text-gray-800 dark:text-gray-200">Intro JeStudios</span>
                                                            <input 
                                                                type="checkbox" 
                                                                checked={appSettings.showSplash}
                                                                onChange={(e) => setAppSettings({...appSettings, showSplash: e.target.checked})}
                                                                className="w-5 h-5 rounded focus:ring-blue-500 text-blue-600 border-gray-300 dark:border-gray-600 dark:bg-gray-700"
                                                            />
                                                        </label>

                                                        <label className="flex items-center justify-between p-3 rounded-xl cursor-pointer bg-gray-50 dark:bg-[#262626] border border-gray-200 dark:border-gray-700">
                                                            <span className="text-sm font-semibold text-gray-800 dark:text-gray-200">Ikon Waktu</span>
                                                            <input 
                                                                type="checkbox" 
                                                                checked={appSettings.showTime}
                                                                onChange={(e) => setAppSettings({...appSettings, showTime: e.target.checked})}
                                                                className="w-5 h-5 rounded focus:ring-blue-500 text-blue-600 border-gray-300 dark:border-gray-600 dark:bg-gray-700"
                                                            />
                                                        </label>
                                                    </div>
                                                </div>

                                                <div className="pt-2 space-y-2">
                                                    <label className="flex items-center justify-between p-3 rounded-xl cursor-pointer bg-gray-50 dark:bg-[#262626] border border-gray-200 dark:border-gray-700">
                                                        <span className="text-sm font-semibold text-gray-800 dark:text-gray-200">Input Catatan Masa Lalu</span>
                                                        <input 
                                                            type="checkbox" 
                                                            checked={appSettings.allowPastInput || false}
                                                            onChange={(e) => {
                                                                if (e.target.checked) setShowPastInputWarning(true);
                                                                else setAppSettings({...appSettings, allowPastInput: false});
                                                            }}
                                                            className="w-5 h-5 rounded focus:ring-blue-500 text-blue-600 border-gray-300 dark:border-gray-600 dark:bg-gray-700"
                                                        />
                                                    </label>

                                                    <label className="flex items-center justify-between p-3 rounded-xl cursor-pointer bg-gray-50 dark:bg-[#262626] border border-gray-200 dark:border-gray-700">
                                                        <span className="text-sm font-semibold text-gray-800 dark:text-gray-200">Intro JeStudios</span>
                                                        <input 
                                                            type="checkbox" 
                                                            checked={appSettings.showRecap}
                                                            onChange={(e) => setAppSettings({...appSettings, showRecap: e.target.checked})}
                                                            className="w-5 h-5 rounded focus:ring-blue-500 text-blue-600 border-gray-300 dark:border-gray-600 dark:bg-gray-700"
                                                        />
                                                    </label>
                                                </div>

                                                <div className="space-y-3">
                                                    <h3 className="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest border-b border-gray-100 dark:border-gray-800 pb-2">Pengaturan Hutang</h3>
                                                    {userProfile.trackedItems?.includes('debt') ? (
                                                        <button 
                                                            onClick={() => { setEditModeType('debt'); setIsEditMode(true); }}
                                                            className="w-full flex items-center justify-center gap-2 py-3 mt-2 text-orange-600 dark:text-orange-400 rounded-xl font-semibold transition-colors bg-orange-50 hover:bg-orange-100 border border-orange-100 dark:bg-orange-900/30 dark:border-orange-800/50 dark:hover:bg-orange-900/50"
                                                        >
                                                            <Edit3 className="w-4 h-4" />
                                                            <span className="text-sm">Edit Data Transaksi Hutang</span>
                                                        </button>
                                                    ) : (
                                                        <p className="text-xs text-gray-500 dark:text-gray-400 italic px-2 pt-2">Belum ada pengaturan khusus.</p>
                                                    )}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                        )}

                        {/* LOGOUT CONFIRMATION MODAL */}
                        {showLogoutConfirm && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 animate-in fade-in duration-200 drop-shadow-2xl bg-black/60 dark:bg-black/80" onClick={() => setShowLogoutConfirm(false)}>
                                <div className="w-full max-w-sm rounded-3xl overflow-hidden flex flex-col p-6 bg-white dark:bg-[#171717] shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <h3 className="font-bold text-gray-900 dark:text-white text-xl mb-2 text-center">Konfirmasi Log Out</h3>
                                    <p className="text-center text-gray-600 dark:text-gray-400 text-sm mb-6">Yakin ingin Log Out dari akun ini?</p>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-3 rounded-xl font-bold bg-gray-100 dark:bg-[#262626] border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-700">Batal</button>
                                        <button type="button" onClick={() => { setShowLogoutConfirm(false); handleLogout(); }} className="flex-1 py-3 bg-red-600 hover:bg-red-700 shadow-lg text-white rounded-xl font-bold transition-colors">Keluar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PAST INPUT WARNING MODAL */}
                        {showPastInputWarning && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 animate-in fade-in duration-200 drop-shadow-2xl bg-black/60 dark:bg-black/80" onClick={() => setShowPastInputWarning(false)}>
                                <div className="w-full max-w-sm rounded-3xl overflow-hidden flex flex-col p-6 bg-white dark:bg-[#171717] shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="mx-auto w-16 h-16 bg-yellow-100 dark:bg-yellow-900/40 rounded-full flex items-center justify-center mb-4 border-4 border-white dark:border-[#171717] shadow-sm">
                                        <span className="text-3xl">⚠️</span>
                                    </div>
                                    <h3 className="font-bold text-gray-900 dark:text-white text-xl mb-2 text-center">Janji Dulu Ya!</h3>
                                    <p className="text-center text-gray-600 dark:text-gray-400 text-sm mb-6 leading-relaxed">
                                        Fitur ini buat kamu yang kelupaan nyatet pengeluaran hari kemarin.<br/><br/>
                                        <span className="font-semibold text-gray-800 dark:text-gray-200">Jangan sampai fitur ini bikin kamu jadi suka menunda-nunda nyatet ya!</span> Disiplin itu kunci 🔑
                                    </p>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowPastInputWarning(false)} className="flex-1 py-3 rounded-xl font-bold bg-gray-100 dark:bg-[#262626] border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Batal</button>
                                        <button type="button" onClick={() => { 
                                            setShowPastInputWarning(false); 
                                            setShowSecondPastInputWarning(true); 
                                        }} className="flex-1 py-3 bg-yellow-500 hover:bg-yellow-600 shadow-lg text-gray-900 rounded-xl font-bold transition-colors">Aku Janji</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SECOND PAST INPUT WARNING MODAL (SILLY/SOFT) */}
                        {showSecondPastInputWarning && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 animate-in zoom-in-95 duration-200 drop-shadow-2xl bg-black/60 dark:bg-black/80 backdrop-blur-sm" onClick={() => setShowSecondPastInputWarning(false)}>
                                <div className="w-full max-w-sm rounded-3xl overflow-hidden flex flex-col p-6 bg-white dark:bg-[#171717] shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="mx-auto w-16 h-16 bg-orange-100 dark:bg-orange-900/40 rounded-full flex items-center justify-center mb-4 border-4 border-white dark:border-[#171717] shadow-sm">
                                        <span className="text-3xl animate-bounce">🤨</span>
                                    </div>
                                    <h3 className="font-black text-gray-900 dark:text-white text-2xl mb-2 text-center uppercase tracking-wider">Apa Benul??</h3>
                                    <p className="text-center text-gray-600 dark:text-gray-400 text-sm mb-6 leading-relaxed">
                                        Nanti kalau bonnya numpuk terus males nyatet<br/><br/>
                                        <span className="font-bold text-gray-800 dark:text-gray-200">Beneran janji rajin nyatet kan?</span>
                                    </p>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowSecondPastInputWarning(false)} className="flex-1 py-3 rounded-xl font-bold bg-gray-100 dark:bg-[#262626] border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Gajadi deh</button>
                                        <button type="button" onClick={() => { 
                                            setAppSettings({...appSettings, allowPastInput: true}); 
                                            setShowSecondPastInputWarning(false); 
                                        }} className="flex-1 py-3 bg-orange-500 hover:bg-orange-600 shadow-lg text-white rounded-xl font-bold transition-all active:scale-95">Baiik baik</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registration for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => console.log('ServiceWorker terdaftar'))
                    .catch(err => console.log('ServiceWorker gagal terdaftar: ', err));
            });
        }
    </script>
</body>
</html>
