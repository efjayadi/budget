                        </div>
                        <button className="bg-theme hover:opacity-80 text-white text-[13px] font-bold py-1.5 px-4 rounded-full shadow-sm transition-opacity">Get</button>
                        <button onClick={(e) => { e.stopPropagation(); onClose(); }} className="p-1.5 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full ml-1 transition-colors"><XIcon className="w-4 h-4" /></button>
                    </div>
                </div>
            );
        };

        const SplashScreen = ({ onComplete }) => {
            const titleRef = useRef(null);
            const [isFading, setIsFading] = useState(false);
            useEffect(() => {
                if (window.Splitting && titleRef.current) window.Splitting({ target: titleRef.current, by: 'chars' });
                const fadeTimer = setTimeout(() => setIsFading(true), 4000); 
                const removeTimer = setTimeout(() => onComplete(), 4500); 
                return () => { clearTimeout(fadeTimer); clearTimeout(removeTimer); };
            }, [onComplete]);

            return (
                <div className="splash-wrapper" onClick={() => { setIsFading(true); setTimeout(onComplete, 500); }} style={{ opacity: isFading ? 0 : 1, transition: 'opacity 0.5s ease-in-out', cursor: 'pointer' }}>
                    <div className="splash-container">
                        <h1 className="splash-title" ref={titleRef}>JeStudios</h1>
                        <div className="splash-dot">
                            <div className="splash-dot-inner">
                                <svg className="splash-dot-wave background" viewBox="0 0 800 800"><path d="M799.09 90s11.04 0 0 0c-80.714 0-79.621-90-200-90-120.377 0-118.607 90-200 90-81.391 0-81.215-90-200-90C80.308 0 78.68 89.29-.91 90c-6.946.062 0 0 0 0v510h800V90z" /></svg>
                                <svg className="splash-dot-wave foreground" viewBox="0 0 800 800"><path d="M799.09 90s11.04 0 0 0c-80.714 0-79.621-90-200-90-120.377 0-118.607 90-200 90-81.391 0-81.215-90-200-90C80.308 0 78.68 89.29-.91 90c-6.946.062 0 0 0 0v510h800V90z" /></svg>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AnimatedNumber = ({ value, formatFn }) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let start = displayValue; let end = value; if (start === end) return;
                const duration = 2000; let startTime = null; let animationFrame;
                const animate = (time) => {
                    if (!startTime) startTime = time;
                    const progress = Math.min((time - startTime) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    setDisplayValue(start + (end - start) * easeOut);
                    if (progress < 1) animationFrame = requestAnimationFrame(animate);
                    else setDisplayValue(end);
                };
                animationFrame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationFrame);
            }, [value]);
            return <span>{formatFn(Math.round(displayValue))}</span>;
        };

        const App = () => {
            const [appSettings, setAppSettings] = useState(() => {
                const saved = localStorage.getItem('app_settings');
                const parsed = saved ? JSON.parse(saved) : { 
                    showSplash: true, 
                    theme: 'system', 
                    customColor: null,
                    tracks: { spending: true, income: false, debt: false },
                    defaultTab: 'spending'
                };
                if(parsed.tracks === undefined) parsed.tracks = { spending: true, income: false, debt: false };
                if(parsed.defaultTab === undefined) parsed.defaultTab = 'spending';
                return parsed;
            });
            const [isSplashVisible, setIsSplashVisible] = useState(appSettings.showSplash);

            // Active Tabs Calculation
            const activeTabs = useMemo(() => ['spending', 'income', 'debt'].filter(t => appSettings.tracks[t]), [appSettings.tracks]);
            const [currentTab, setCurrentTab] = useState(appSettings.defaultTab && activeTabs.includes(appSettings.defaultTab) ? appSettings.defaultTab : (activeTabs[0] || 'spending'));

            // Core States
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [uid, setUid] = useState(''); 
            const [loginStep, setLoginStep] = useState('auth'); 
            const [budget, setBudget] = useState(0);
            const [paycheckDate, setPaycheckDate] = useState('');
            const [expenses, setExpenses] = useState([]);
            const [userProfile, setUserProfile] = useState({ name: '', age: '', gender: '', promiseBudget: '', createdAt: '', incomeGoal: '', incomeGoalDate: '', debts: [] });

            // UI States
            const [setupStep, setSetupStep] = useState(1);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [currentView, setCurrentView] = useState('home'); 
            const [isDebtExpanded, setIsDebtExpanded] = useState(false);
            const [isAddDebtModal, setIsAddDebtModal] = useState(false);
            
            // Animation & Interaction
            const [currentMonthOffset, setCurrentMonthOffset] = useState(0); 
            const [isAnimatingMonth, setIsAnimatingMonth] = useState(false);
            const [monthAnimDir, setMonthAnimDir] = useState(0); 
            const [touchStartPos, setTouchStartPos] = useState({x: null, y: null});
            const [touchEndPos, setTouchEndPos] = useState({x: null, y: null});
            
            // Inputs
            const [amountInput, setAmountInput] = useState('');
            const [descInput, setDescInput] = useState('');
            const [selectedDateReceipt, setSelectedDateReceipt] = useState(null);
            
            const [isTakingDamage, setIsTakingDamage] = useState(false);
            const prevRemainingRef = useRef(0);

            // PWA Logic
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isIOS, setIsIOS] = useState(false);
            const [isStandalone, setIsStandalone] = useState(false);
            const [showPWANotif, setShowPWANotif] = useState(false);

            // ==========================================
            // THEME ENGINE
            // ==========================================
            useEffect(() => {
                const root = document.documentElement;
                const applyTheme = () => {
                    let isDark = appSettings.theme === 'dark' || (appSettings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                    isDark ? root.classList.add('dark') : root.classList.remove('dark');
                    root.style.setProperty('--theme-color', appSettings.customColor || (isDark ? '#22c55e' : '#16a34a'));
                    root.style.setProperty('--theme-color-dark', appSettings.customColor ? appSettings.customColor : (isDark ? '#16a34a' : '#15803d'));
                };
                applyTheme();
                const matcher = window.matchMedia('(prefers-color-scheme: dark)');
                matcher.addEventListener('change', applyTheme);
                return () => matcher.removeEventListener('change', applyTheme);
            }, [appSettings.theme, appSettings.customColor]);

            useEffect(() => { localStorage.setItem('app_settings', JSON.stringify(appSettings)); }, [appSettings]);
            useEffect(() => { if(!activeTabs.includes(currentTab)) setCurrentTab(activeTabs[0] || 'spending'); }, [activeTabs]);

            // ==========================================
            // PWA & AUTO-FOCUS RESET
            // ==========================================
            useEffect(() => {
                const isDeviceIOS = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
                setIsIOS(isDeviceIOS);
                const checkStandalone = () => ('standalone' in window.navigator) && window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
                setIsStandalone(checkStandalone());
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); if (!checkStandalone()) setShowPWANotif(true); };
                window.addEventListener('beforeinstallprompt', handler);
                if (isDeviceIOS && !checkStandalone()) { const timer = setTimeout(() => setShowPWANotif(true), 2500); return () => clearTimeout(timer); }
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstallApp = async () => {
                if (isIOS) { alert('Untuk menginstal di iOS:\n1. Tap ikon Share di bawah layar.\n2. Pilih "Add to Home Screen".'); return; }
                if (!deferredPrompt) { alert('Install manual: Tekan menu titik tiga di Chrome > Install App.'); return; }
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { setShowPWANotif(false); setDeferredPrompt(null); }
            };

            useEffect(() => {
                const handleFocusOut = () => setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
                window.addEventListener('focusout', handleFocusOut);
                return () => window.removeEventListener('focusout', handleFocusOut);
            }, []);

            // ==========================================
            // FIREBASE DATA
            // ==========================================
            useEffect(() => {
                if (!auth) { setLoginStep('login'); return; }
                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                    if (user) { setFirebaseUser(user); await handleUserAuthSuccess(user); } 
                    else { setFirebaseUser(null); setLoginStep('login'); }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!firebaseUser || loginStep !== 'app' || !uid || !db) return;
                const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid);
                return onSnapshot(expensesRef, (snapshot) => {
                    const exps = [];
                    snapshot.forEach(doc => exps.push({ id: doc.id, ...doc.data() }));
                    exps.sort((a,b) => new Date(b.date) - new Date(a.date));
                    setExpenses(exps);
                });
            }, [firebaseUser, loginStep, uid]);

            const handleUserAuthSuccess = async (user) => {
                setUid(user.uid);
                if (!db) { setLoginStep('setup'); return; }
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    setUserProfile(data); setBudget(data.budget || 0); setPaycheckDate(data.paycheckDate || 1);
                    setLoginStep('app');
                } else {
                    setUserProfile(prev => ({...prev, name: user.displayName || ''}));
                    setLoginStep('setup');
                }
            };

            const formatNumber = (amount) => new Intl.NumberFormat('id-ID').format(amount);
            const formatCompact = (amount) => amount === 0 ? '0' : new Intl.NumberFormat('id-ID', { notation: "compact", maximumFractionDigits: 1 }).format(amount);

            // ==========================================
            // CALCULATIONS
            // ==========================================
            const createdAtTime = useMemo(() => {
                if (userProfile.createdAt) return new Date(userProfile.createdAt).setHours(0,0,0,0);
                if (expenses.length > 0) return new Date(expenses[expenses.length-1].date).setHours(0,0,0,0);
                return new Date().setHours(0,0,0,0);
            }, [userProfile.createdAt, expenses]);

            // SPENDING LOGIC
            const spendingEntries = useMemo(() => expenses.filter(e => e.type === 'expense'), [expenses]);
            const totalSpent = useMemo(() => spendingEntries.reduce((s, e) => s + e.amount, 0), [spendingEntries]);
            const remaining = budget - totalSpent;
            const spendPercentage = budget > 0 ? Math.max(0, Math.min(100, (remaining / budget) * 100)) : 0;
            
            useEffect(() => {
                if (currentTab === 'spending' && remaining < prevRemainingRef.current) {
                    setIsTakingDamage(true); setTimeout(() => setIsTakingDamage(false), 500); 
                }
                prevRemainingRef.current = remaining;
            }, [remaining, currentTab]);

            // INCOME LOGIC
            const incomeEntries = useMemo(() => expenses.filter(e => e.type === 'income_entry'), [expenses]);
            const totalIncome = useMemo(() => incomeEntries.reduce((s, e) => s + e.amount, 0), [incomeEntries]);
            const incomeGoal = parseInt(userProfile.incomeGoal) || 0;
            const incomePercentage = incomeGoal > 0 ? Math.min(100, (totalIncome / incomeGoal) * 100) : 0;

            // DEBT LOGIC
            const debtPayments = useMemo(() => expenses.filter(e => e.type === 'debt_payment'), [expenses]);
            const debts = userProfile.debts || [];
            const totalDebtRaw = debts.reduce((s, d) => s + (parseInt(d.totalAmount)||0), 0);
            const totalDebtPaid = debtPayments.reduce((s, e) => s + e.amount, 0);
            const remainingDebt = Math.max(0, totalDebtRaw - totalDebtPaid);

            const debtProgressList = useMemo(() => {
                return debts.map(d => {
                    const paid = debtPayments.filter(p => p.debtId === d.id).reduce((s, p) => s + p.amount, 0);
                    return { ...d, paid, remaining: Math.max(0, d.totalAmount - paid), pct: d.totalAmount > 0 ? Math.min(100, (paid/d.totalAmount)*100) : 0 };
                });
            }, [debts, debtPayments]);

            const daysLeft = useMemo(() => {
                const today = new Date(); const actual = paycheckDate || 1;
                let next = new Date(today.getFullYear(), today.getMonth(), actual);
                if (today.getDate() >= actual) next.setMonth(next.getMonth() + 1);
                return Math.max(1, Math.ceil((next.getTime() - today.getTime()) / (1000 * 60 * 60 * 24)));
            }, [paycheckDate]);

            // Filter lists based on tab
            const visibleExpenses = useMemo(() => {
                if (currentTab === 'spending') return spendingEntries;
                if (currentTab === 'income') return incomeEntries;
                if (currentTab === 'debt') return debtPayments;
                return [];
            }, [currentTab, spendingEntries, incomeEntries, debtPayments]);

            const groupedExpenses = useMemo(() => {
                const groups = {};
                visibleExpenses.forEach(exp => {
                    const date = new Date(exp.date); const today = new Date(); const yest = new Date(today); yest.setDate(yest.getDate() - 1);
                    let dateKey = date.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
                    if (date.toDateString() === today.toDateString()) dateKey = "Hari Ini";
                    else if (date.toDateString() === yest.toDateString()) dateKey = "Kemarin";
                    if (!groups[dateKey]) groups[dateKey] = [];
                    groups[dateKey].push(exp);
                });
                return groups;
            }, [visibleExpenses]);

            const calendarData = useMemo(() => {
                const today = new Date();
                const targetMonth = new Date(today.getFullYear(), today.getMonth() + currentMonthOffset, 1);
                const year = targetMonth.getFullYear(); const month = targetMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = []; let totalMonth = 0;

                for (let d = 1; d <= daysInMonth; d++) {
                    const cd = new Date(year, month, d);
                    const dayExps = visibleExpenses.filter(e => new Date(e.date).toDateString() === cd.toDateString());
                    const dailyTotal = dayExps.reduce((s, e) => s + e.amount, 0);
                    totalMonth += dailyTotal;
                    
                    days.push({
                        day: d, dailyTotal, exps: dayExps,
                        isToday: d === today.getDate() && month === today.getMonth() && year === today.getFullYear(),
                        isFuture: cd.setHours(0,0,0,0) > new Date().setHours(0,0,0,0),
                        isBeforeStart: cd.setHours(0,0,0,0) < createdAtTime,
                        dateStr: cd.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'long' })
                    });
                }
                return { days, monthName: targetMonth.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }), totalMonth };
            }, [visibleExpenses, currentMonthOffset, createdAtTime]);

            // ==========================================
            // MUTATIONS
            // ==========================================
            const handleSubmitInput = async (e) => {
                e.preventDefault();
                const amount = parseFloat(amountInput.replace(/\D/g, ''));
                if (amount > 0 && descInput.trim()) {
                    const payload = { amount, description: descInput.trim(), date: new Date().toISOString() };
                    
                    if (currentTab === 'spending') payload.type = 'expense';
                    else if (currentTab === 'income') payload.type = 'income_entry';
                    else if (currentTab === 'debt') {
                        payload.type = 'debt_payment';
                        payload.debtId = descInput; 
                        payload.description = debts.find(d=>d.id === descInput)?.name || 'Bayar Hutang';
                    }
                    
                    if (db) await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid), payload);
                    
                    setAmountInput('');
                    if (currentTab !== 'debt') setDescInput('');
                    if (document.activeElement) document.activeElement.blur();
                }
            };

            const addNewDebt = async (e) => {
                e.preventDefault();
                const elName = e.target.elements.debtName.value;
                const elAmt = parseFloat(e.target.elements.debtAmount.value.replace(/\D/g, ''));
                if(elName && elAmt) {
                    const updated = [...debts, { id: generateUUID(), name: elName, totalAmount: elAmt }];
                    setUserProfile({...userProfile, debts: updated});
                    if(db) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', uid), { debts: updated });
                    setIsAddDebtModal(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const color = await extractDominantColor(ev.target.result);
                        setAppSettings({...appSettings, customColor: color});
                    };
                    reader.readAsDataURL(file);
                }
            };

            // ==========================================
            // RENDERS
            // ==========================================
            if (isSplashVisible) return <SplashScreen onComplete={() => setIsSplashVisible(false)} />;
            
            if (loginStep === 'login' || loginStep === 'auth') {
                return (
                    <div className="fixed inset-0 bg-white dark:bg-gray-900 flex flex-col items-center justify-center p-6 text-center z-50">
                        <PWANotif show={showPWANotif} onInstall={handleInstallApp} onClose={() => setShowPWANotif(false)} />
                        {loginStep === 'auth' ? <div className="w-12 h-12 border-4 border-theme border-t-transparent rounded-full animate-spin"></div> : (
                        <div className="w-full max-w-sm flex flex-col items-center animate-in fade-in zoom-in-95 duration-500">
                            <div className="flex items-end mb-4">
                                <h1 className="text-6xl font-black text-gray-900 dark:text-white tracking-tighter">Wang</h1>
                                <div className="w-4 h-4 bg-theme rounded-full ml-1.5 mb-1.5 shadow-[0_0_15px_rgba(34,197,94,0.6)]"></div>
                            </div>
                            <p className="text-sm text-gray-500 dark:text-gray-400 mb-10 px-2 font-medium leading-relaxed">atur pengeluaran biar kamu selamat sampai akhir bulan, dan biar ga insomnia uang habis ke mana</p>
                            <div className="w-full space-y-3">
                                <p className="text-xs font-bold text-gray-400 dark:text-gray-500 mb-4 uppercase tracking-widest">Login biar datamu tersimpan</p>
                                <button onClick={handleGoogleLogin} className="w-full py-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-white rounded-2xl font-bold text-[15px] active:scale-95 flex items-center justify-center shadow-sm transition-all"><GoogleIcon className="w-5 h-5 mr-3" /> Lanjutkan dengan Google</button>
                                <div className="flex items-center py-2 opacity-50"><div className="flex-grow border-t border-gray-300 dark:border-gray-600"></div><span className="px-4 text-xs text-gray-400 dark:text-gray-500 font-bold uppercase tracking-wider">atau</span><div className="flex-grow border-t border-gray-300 dark:border-gray-600"></div></div>
                                <button onClick={async () => { await signInAnonymously(auth); }} className="w-full py-4 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-2xl font-bold text-[15px] active:scale-95 shadow-sm transition-all">Lanjut sebagai Guest</button>
                            </div>
                        </div>
                        )}
                    </div>
                );
            }

            if (loginStep === 'setup') {
                return (
                    <div className="fixed inset-0 bg-white dark:bg-gray-900 flex flex-col items-center justify-center p-6 z-50">
                        <div className="w-full max-w-md space-y-6">
                        {setupStep === 1 && (
                            <div className="animate-in fade-in slide-in-from-right-4">
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white text-center mb-8">Siapa nama kamu?</h1>
                                <div className="space-y-4">
                                    <input type="text" value={userProfile.name} onChange={e=>setUserProfile({...userProfile, name: e.target.value})} placeholder="Nama Panggilan" className="w-full px-5 py-4 bg-white dark:bg-gray-800 text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-700 rounded-2xl outline-none" />
                                    <input type="number" value={userProfile.age} onChange={e=>setUserProfile({...userProfile, age: e.target.value})} placeholder="Umur" className="w-full px-5 py-4 bg-white dark:bg-gray-800 text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-700 rounded-2xl outline-none" />
                                    <button onClick={() => setSetupStep(2)} disabled={!userProfile.name} className="w-full mt-4 py-4 bg-theme text-white rounded-2xl font-bold text-lg disabled:opacity-50 transition-all">Lanjut</button>
                                </div>
                            </div>
                        )}
                        {setupStep === 2 && (
                            <div className="animate-in fade-in slide-in-from-right-4">
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white text-center mb-8">Apa yang mau dipantau?</h1>
                                <div className="space-y-3">
                                    {['spending', 'income', 'debt'].map(key => (
                                        <label key={key} className={`flex items-center justify-between p-5 rounded-2xl border-2 transition-all cursor-pointer ${appSettings.tracks[key] ? 'border-theme bg-theme/10' : 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800'}`}>
                                            <span className="font-bold text-gray-800 dark:text-gray-100 text-lg capitalize">{key === 'spending' ? 'Pengeluaran' : key === 'income' ? 'Pemasukan / Tabungan' : 'Hutang / Cicilan'}</span>
                                            <input type="checkbox" checked={appSettings.tracks[key]} onChange={e => setAppSettings({...appSettings, tracks:{...appSettings.tracks, [key]: e.target.checked}})} className="w-6 h-6 text-theme border-gray-300 rounded focus:ring-theme" />
                                        </label>
                                    ))}
                                    <button onClick={() => setSetupStep(3)} disabled={!Object.values(appSettings.tracks).some(v=>v)} className="w-full mt-6 py-4 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-2xl font-bold text-lg disabled:opacity-50 transition-all">Lanjut</button>
                                </div>
                            </div>
                        )}
                        {setupStep === 3 && (
                            <form onSubmit={handleFinishSetup} className="animate-in fade-in slide-in-from-right-4">
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white text-center mb-8">Setup Detail</h1>
                                <div className="space-y-4">
                                    {appSettings.tracks.spending && (
                                        <div className="p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl space-y-3 border border-gray-100 dark:border-gray-700">
                                            <p className="font-bold text-gray-700 dark:text-gray-300 text-sm uppercase tracking-wider">Pengeluaran</p>
                                            <input type="text" value={budget ? budget.toLocaleString('id-ID') : ''} onChange={e => setBudget(parseFloat(e.target.value.replace(/\D/g, ''))||0)} placeholder="Total Anggaran Bulanan (Rp)" className="w-full px-4 py-3 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-xl border border-gray-200 dark:border-gray-700" required />
                                            <input type="number" min="1" max="31" value={paycheckDate} onChange={e => setPaycheckDate(e.target.value)} placeholder="Tanggal Gajian (1-31)" className="w-full px-4 py-3 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-xl border border-gray-200 dark:border-gray-700" required />
                                        </div>
                                    )}
                                    {appSettings.tracks.income && (
                                        <div className="p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl space-y-3 border border-gray-100 dark:border-gray-700">
                                            <p className="font-bold text-gray-700 dark:text-gray-300 text-sm uppercase tracking-wider">Target Tabungan</p>
                                            <input type="text" value={userProfile.incomeGoal ? parseInt(userProfile.incomeGoal).toLocaleString('id-ID') : ''} onChange={e => setUserProfile({...userProfile, incomeGoal: e.target.value.replace(/\D/g, '')})} placeholder="Target Jumlah (Rp)" className="w-full px-4 py-3 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-xl border border-gray-200 dark:border-gray-700" required />
                                            <input type="date" value={userProfile.incomeGoalDate} onChange={e => setUserProfile({...userProfile, incomeGoalDate: e.target.value})} className="w-full px-4 py-3 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded-xl border border-gray-200 dark:border-gray-700" required />
                                        </div>
                                    )}
                                    {appSettings.tracks.debt && (
                                        <p className="text-sm text-gray-500 dark:text-gray-400 italic text-center py-2">Catatan hutang bisa ditambahkan nanti di halaman utama.</p>
                                    )}
                                    <button type="submit" className="w-full py-4 bg-theme hover:opacity-90 text-white rounded-2xl font-bold text-lg active:scale-95 transition-all mt-6">Mulai Bertahan</button>
                                </div>
                            </form>
                        )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-gray-50 dark:bg-gray-950 flex justify-center w-full overflow-hidden text-gray-900 dark:text-white transition-colors duration-300">
                    <PWANotif show={showPWANotif} onInstall={handleInstallApp} onClose={() => setShowPWANotif(false)} />
                    
                    <div className="w-full max-w-md h-full relative shadow-sm overflow-hidden flex flex-col bg-white dark:bg-gray-900">
                        
                        {/* TAB BAR */}
                        {activeTabs.length > 1 && (
                            <div className="shrink-0 w-full flex bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 pt-safe-top z-40">
                                {activeTabs.map(tab => (
                                    <button key={tab} onClick={() => setCurrentTab(tab)} className={`flex-1 py-3 text-sm font-bold capitalize transition-colors border-b-2 ${currentTab === tab ? 'border-theme text-theme' : 'border-transparent text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}>
                                        {tab === 'spending' ? 'Pengeluaran' : tab === 'income' ? 'Pemasukan' : 'Hutang'}
                                    </button>
                                ))}
                            </div>
                        )}

                        <div className="flex w-[200%] flex-1 min-h-0 transition-transform duration-300 ease-in-out" style={{ transform: currentView === 'calendar' ? 'translateX(-50%)' : 'translateX(0)' }} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                            
                            {/* HOME PANE */}
                            <div className="w-1/2 h-full flex flex-col relative overflow-hidden bg-white dark:bg-gray-900">
                                <button onClick={() => setCurrentView('calendar')} className="absolute top-4 right-4 z-50 p-2 text-gray-400 hover:text-gray-800 dark:hover:text-white">
                                    <CalendarIcon className="w-6 h-6" strokeWidth={1.5} />
                                </button>

                                <div className="flex-1 min-h-0 overflow-y-auto pb-32" onScroll={handleHomeScroll}>
                                    <div className={`sticky top-0 w-full bg-white/95 dark:bg-gray-900/95 backdrop-blur-md z-40 px-5 transition-all duration-500 ease-in-out ${isScrolled ? 'pt-4 pb-2 border-b border-gray-100 dark:border-gray-800' : 'pt-12 pb-8'}`}>
                                        
                                        {/* HEADER CONTENT: SPENDING */}
                                        {currentTab === 'spending' && (
                                        <div className="flex flex-col items-center justify-center w-full relative">
                                            <span className={`font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest transition-all ${isScrolled ? 'text-[10px]' : 'text-sm'}`}>Sisa Uang</span>
                                            <div className={`flex items-start justify-center transition-all ${isScrolled ? 'my-1' : 'my-4'}`}>
                                                <span className={`font-medium text-gray-400 mt-1 mr-1 ${isScrolled ? 'text-xs' : 'text-xl'}`}>Rp</span>
                                                <span className={`font-bold tracking-tighter leading-none ${isScrolled ? 'text-2xl' : 'text-6xl'}`}><AnimatedNumber value={remaining} formatFn={formatNumber} /></span>
                                            </div>
                                            
                                            <div className={`overflow-hidden transition-all flex justify-center items-center ${isScrolled ? 'h-0 opacity-0' : 'h-8 opacity-100 mb-6'}`}>
                                                <div className={`text-sm font-semibold px-4 py-1.5 rounded-full flex items-center border transition-colors ${isDangerBadge ? 'bg-red-50 dark:bg-red-900/30 text-red-600 border-red-200 dark:border-red-800 animate-pulse' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700'}`}>
                                                    <span>Sisa {daysLeft} hari</span>
                                                    <span className="mx-2 opacity-50">•</span>
                                                    <span>Rp {formatNumber(Math.max(0, dailyAllowance))} / hari</span>
                                                </div>
                                            </div>

                                            <div className={`relative w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden transition-all ${isScrolled ? 'h-1.5' : 'h-4'}`}>
                                                <div className="h-full transition-all bg-theme relative" style={{ width: `${percentage}%`, backgroundColor: percentage === 0 ? 'red' : 'var(--theme-color)' }}>
                                                    <div className="absolute inset-0 bg-white/20 animate-breathe"></div>
                                                </div>
                                            </div>
                                        </div>
                                        )}

                                        {/* HEADER CONTENT: INCOME */}
                                        {currentTab === 'income' && (
                                        <div className="flex flex-col items-center justify-center w-full relative">
                                            <span className={`font-bold text-theme uppercase tracking-widest transition-all ${isScrolled ? 'text-[10px]' : 'text-sm'}`}>Total Terkumpul</span>
                                            <div className={`flex items-start justify-center transition-all text-theme ${isScrolled ? 'my-1' : 'my-4'}`}>
                                                <span className={`font-medium mt-1 mr-1 ${isScrolled ? 'text-xs' : 'text-xl'}`}>Rp</span>
                                                <span className={`font-bold tracking-tighter leading-none ${isScrolled ? 'text-2xl' : 'text-6xl'}`}><AnimatedNumber value={totalIncome} formatFn={formatNumber} /></span>
                                            </div>
                                            
                                            <div className={`overflow-hidden transition-all flex flex-col justify-center items-center ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 mb-6'}`}>
                                                <p className="text-xs font-bold text-gray-400 uppercase">Target: Rp {formatNumber(incomeGoal)}</p>
                                                {userProfile.incomeGoalDate && <p className="text-[10px] text-gray-500 mt-1">Tenggat: {new Date(userProfile.incomeGoalDate).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</p>}
                                            </div>

                                            <div className={`relative w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden transition-all ${isScrolled ? 'h-1.5' : 'h-4'}`}>
                                                <div className="h-full transition-all bg-theme relative" style={{ width: `${incomePercentage}%` }}>
                                                    <div className="absolute inset-0 bg-white/20 animate-breathe"></div>
                                                </div>
                                            </div>
                                        </div>
                                        )}

                                        {/* HEADER CONTENT: DEBT */}
                                        {currentTab === 'debt' && (
                                        <div className="flex flex-col w-full relative">
                                            <div className="text-center" onClick={() => setIsDebtExpanded(!isDebtExpanded)}>
                                                <span className={`font-bold text-red-500 uppercase tracking-widest transition-all flex items-center justify-center gap-1 cursor-pointer ${isScrolled ? 'text-[10px]' : 'text-sm'}`}>
                                                    Sisa Hutang {isDebtExpanded ? <ChevronUp className="w-3 h-3"/> : <ChevronDown className="w-3 h-3"/>}
                                                </span>
                                                <div className={`flex items-start justify-center transition-all text-red-600 ${isScrolled ? 'my-1' : 'my-4'}`}>
                                                    <span className={`font-medium mt-1 mr-1 ${isScrolled ? 'text-xs' : 'text-xl'}`}>Rp</span>
                                                    <span className={`font-bold tracking-tighter leading-none ${isScrolled ? 'text-2xl' : 'text-6xl'}`}><AnimatedNumber value={remainingDebt} formatFn={formatNumber} /></span>
                                                </div>
                                            </div>

                                            {/* Expandable Debt List */}
                                            <div className={`overflow-hidden transition-all duration-300 w-full ${isDebtExpanded && !isScrolled ? 'max-h-[400px] opacity-100 mt-4' : 'max-h-0 opacity-0 mt-0'}`}>
                                                <div className="bg-gray-50 dark:bg-gray-800 rounded-2xl p-4 space-y-4 shadow-inner border border-gray-100 dark:border-gray-700">
                                                    {debtProgressList.map(d => (
                                                        <div key={d.id} className="space-y-1">
                                                            <div className="flex justify-between text-sm font-bold">
                                                                <span className="text-gray-700 dark:text-gray-200">{d.name}</span>
                                                                <span className="text-red-500">Rp {formatNumber(d.remaining)}</span>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <div className="flex-1 h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                                                    <div className="h-full bg-theme" style={{width: `${d.pct}%`}}></div>
                                                                </div>
                                                                <span className="text-[10px] font-bold text-gray-400 w-8 text-right">{Math.floor(d.pct)}%</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {debtProgressList.length === 0 && <p className="text-xs text-center text-gray-400 italic">Belum ada hutang tercatat.</p>}
                                                    <button onClick={() => setIsAddDebtModal(true)} className="w-full py-2 border-2 border-dashed border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 rounded-xl text-sm font-bold hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">+ Tambah Hutang Baru</button>
                                                </div>
                                            </div>
                                        </div>
                                        )}
                                    </div>

                                    {/* LIST CONTENT */}
                                    <div className="px-5 pt-4 pb-10">
                                        {Object.keys(groupedExpenses).length === 0 ? (
                                        <div className="text-center py-10 text-gray-300 dark:text-gray-600">
                                            <p className="font-semibold text-sm">Belum ada {currentTab === 'spending'?'pengeluaran':currentTab==='income'?'pemasukan':'pembayaran hutang'}.</p>
                                        </div>
                                        ) : (
                                        <div className="pb-6">
                                            {Object.entries(groupedExpenses).map(([dateStr, dayExpenses]) => (
                                            <div key={dateStr} className="mb-6 relative">
                                                <div className="py-1 mb-2"><span className="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">{dateStr}</span></div>
                                                <div className="space-y-3 mt-1">
                                                {dayExpenses.map((expense) => {
                                                    return (
                                                    <div key={expense.id} className="flex items-center py-1 animate-in fade-in duration-300">
                                                        <div className="text-[15px] text-gray-700 dark:text-gray-200 font-medium">{expense.description}</div>
                                                        <div className="flex-1 border-b border-dashed border-gray-200 dark:border-gray-800 mx-3 mt-2"></div>
                                                        <div className="flex items-center">
                                                            <span className="text-[11px] text-gray-400 dark:text-gray-500 mr-0.5">Rp</span>
                                                            <span className={`text-[15px] font-bold tracking-tight ${currentTab==='income'?'text-theme':currentTab==='debt'?'text-blue-500':'text-gray-900 dark:text-white'}`}>{formatNumber(expense.amount)}</span>
                                                        </div>
                                                    </div>
                                                    );
                                                })}
                                                </div>
                                            </div>
                                            ))}
                                        </div>
                                        )}
                                    </div>
                                </div>

                                {/* FLOATING CAPSULE INPUT FORM */}
                                <div className="absolute bottom-6 left-4 right-4 z-50">
                                    <form onSubmit={handleSubmitInput} className="flex items-center bg-white dark:bg-gray-800 p-1.5 rounded-full shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] dark:shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] border border-gray-100 dark:border-gray-700 backdrop-blur-lg">
                                        
                                        {currentTab === 'debt' ? (
                                            <select value={descInput} onChange={e=>setDescInput(e.target.value)} className="flex-1 bg-transparent border-none text-[15px] font-medium text-gray-800 dark:text-white outline-none pl-3 appearance-none" required>
                                                <option value="" disabled className="text-gray-400">Pilih Hutang...</option>
                                                {debts.filter(d => { const paid = debtPayments.filter(p=>p.debtId===d.id).reduce((s,p)=>s+p.amount,0); return d.totalAmount > paid; }).map(d => (
                                                    <option key={d.id} value={d.id} className="text-black">{d.name}</option>
                                                ))}
                                            </select>
                                        ) : (
                                            <input type="text" value={descInput} onChange={e=>setDescInput(e.target.value)} placeholder={currentTab==='income'?"Sumber dana?":"Beli apa?"} className="flex-1 w-0 bg-transparent border-none text-[15px] font-medium text-gray-800 dark:text-white outline-none placeholder-gray-400 dark:placeholder-gray-500 px-3 focus:ring-0" required />
                                        )}
                                        
                                        <div className="w-[1px] h-5 bg-gray-200 dark:bg-gray-700 mx-1"></div>
                                        
                                        <input type="text" value={amountInput} onChange={(e) => { const r=e.target.value.replace(/\D/g, ''); setAmountInput(r?parseInt(r).toLocaleString('id-ID'):''); }} placeholder="Rp 0" className="w-24 bg-transparent border-none text-[15px] font-bold text-gray-900 dark:text-white outline-none placeholder-gray-300 dark:placeholder-gray-600 focus:ring-0 text-right px-2" required />
                                        
                                        <button type="submit" disabled={!amountInput || !descInput.trim()} className="bg-theme hover:opacity-80 text-white rounded-full p-3 ml-1 flex items-center justify-center transition-all active:scale-90 disabled:opacity-30 disabled:active:scale-100 shrink-0 shadow-sm">
                                            {currentTab === 'spending' ? <TrendingDown className="w-4 h-4" strokeWidth={3} /> : currentTab === 'income' ? <TrendingUp className="w-4 h-4" strokeWidth={3} /> : <Wallet className="w-4 h-4" />}
                                        </button>
                                    </form>
                                </div>
                            </div>

                            {/* CALENDAR PANE */}
                            <div className="w-1/2 h-full bg-gray-50 dark:bg-gray-950 flex flex-col relative overflow-hidden shadow-[inset_10px_0_20px_-10px_rgba(0,0,0,0.05)] dark:shadow-[inset_10px_0_20px_-10px_rgba(0,0,0,0.2)] border-l border-gray-200 dark:border-gray-800">
                                <div className="shrink-0 flex items-center justify-between px-4 pt-4 pb-3 bg-white dark:bg-gray-900 shadow-sm z-10 border-b border-gray-100 dark:border-gray-800">
                                    <div className="flex items-center">
                                        <button onClick={() => setCurrentView('home')} className="p-2 -ml-2 text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors"><ChevronLeft className="w-6 h-6" /></button>
                                        <h2 className="text-lg font-bold ml-1">{calendarData.monthName}</h2>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => changeMonth(-1)} disabled={isStartMonth()} className={`p-2 rounded-full transition-colors ${isStartMonth() ? 'text-gray-300 dark:text-gray-700' : 'text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800'}`}><ChevronUp className="w-5 h-5" /></button>
                                        <button onClick={() => changeMonth(1)} className="p-2 rounded-full text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><ChevronDown className="w-5 h-5" /></button>
                                        <div className="w-px h-5 bg-gray-200 dark:bg-gray-700 mx-1"></div>
                                        <button onClick={() => setIsSettingsOpen(true)} className="p-2 rounded-full text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><SettingsIcon className="w-5 h-5" /></button>
                                    </div>
                                </div>

                                <div className={`flex-1 min-h-0 overflow-y-auto p-4 pb-20 transition-all duration-150 ${isAnimatingMonth ? `opacity-0 ${monthAnimDir > 0 ? '-translate-y-4' : 'translate-y-4'}` : 'opacity-100 translate-y-0'}`} onTouchEnd={(e) => { e.stopPropagation(); onCalendarTouchEnd(e); }}>
                                    <div className="grid grid-cols-5 gap-1.5">
                                        {calendarData.days.map((dayObj, i) => {
                                            const target = parseInt(userProfile.promiseBudget) || 0;
                                            let bg = 'bg-white dark:bg-gray-900 border-gray-100 dark:border-gray-800';
                                            let text = 'text-gray-600 dark:text-gray-400';
                                            if (dayObj.isFuture || dayObj.isBeforeStart) { bg = 'bg-gray-50 dark:bg-gray-950 opacity-40 border-transparent'; text = 'text-gray-400 dark:text-gray-600'; }
                                            else if (dayObj.dailyTotal > 0) {
                                                if(currentTab === 'spending') {
                                                    if(dayObj.dailyTotal <= target) { bg = 'bg-theme/10 border-theme/20'; text = 'text-theme'; }
                                                    else { bg = 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-900/50'; text = 'text-red-500'; }
                                                } else if (currentTab === 'income') { bg = 'bg-theme/10 border-theme/20'; text = 'text-theme'; }
                                                else { bg = 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-900/50'; text = 'text-blue-500'; }
                                            }

                                            return (
                                                <div key={i} onClick={() => !dayObj.isFuture && !dayObj.isBeforeStart && setSelectedDateReceipt(dayObj)} className={`flex flex-col items-center justify-center p-1.5 rounded-lg border ${dayObj.isToday ? 'ring-2 ring-blue-400 ring-offset-1 dark:ring-offset-gray-900' : ''} ${bg} aspect-square relative cursor-pointer active:scale-95 transition-transform`}>
                                                    <span className={`absolute top-1 left-1.5 text-[9px] font-bold ${text}`}>{dayObj.day}</span>
                                                    {!dayObj.isFuture && !dayObj.isBeforeStart && dayObj.dailyTotal > 0 && (
                                                        <span className={`mt-3 text-[9px] font-bold tracking-tighter ${currentTab==='spending'?'text-red-500':currentTab==='income'?'text-theme':'text-blue-500'}`}>{formatCompact(dayObj.dailyTotal)}</span>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                    <div className="mt-6 p-4 bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm text-center">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total {currentTab==='spending'?'Pengeluaran':currentTab==='income'?'Pemasukan':'Pembayaran'} Bulan Ini</p>
                                        <p className={`text-2xl font-bold tracking-tight ${currentTab==='spending'?'text-red-500':currentTab==='income'?'text-theme':'text-blue-500'}`}>{currentTab==='spending'?'-':'+'}Rp {formatNumber(calendarData.totalMonth)}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RECEIPT MODAL */}
                        {selectedDateReceipt && (
                            <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 animate-in fade-in duration-200" onClick={() => setSelectedDateReceipt(null)}>
                                <div className="w-full max-w-sm drop-shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="receipt-mask bg-white dark:bg-gray-100 w-full flex flex-col max-h-[80vh] text-black">
                                        <div className="p-5 border-b border-gray-300 border-dashed shrink-0">
                                            <h3 className="text-center font-black uppercase tracking-widest text-lg">Catatan {currentTab}</h3>
                                            <p className="text-center text-xs text-gray-500 mt-1 font-semibold">{selectedDateReceipt.dateStr}</p>
                                        </div>
                                        <div className="p-5 flex-1 overflow-y-auto">
                                            <div className="space-y-3">
                                                {selectedDateReceipt.exps.map(exp => (
                                                    <div key={exp.id} className="flex justify-between items-center text-sm border-b border-gray-100 pb-2 last:border-0">
                                                        <span className="text-gray-700 font-medium">{exp.description}</span>
                                                        <span className="font-bold text-gray-900">{formatNumber(exp.amount)}</span>
                                                    </div>
                                                ))}
                                                {selectedDateReceipt.exps.length === 0 && <p className="text-center text-gray-400 text-sm italic">Kosong.</p>}
                                            </div>
                                        </div>
                                        <div className="p-5 pt-0 shrink-0">
                                            <div className="border-t-2 border-black pt-3 flex justify-between font-black text-sm">
                                                <span>TOTAL</span>
                                                <span>Rp {formatNumber(selectedDateReceipt.dailyTotal)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ADD DEBT MODAL */}
                        {isAddDebtModal && (
                            <div className="fixed inset-0 z-[110] bg-black/60 flex items-center justify-center p-6 animate-in fade-in" onClick={() => setIsAddDebtModal(false)}>
                                <div className="bg-white dark:bg-gray-800 w-full max-w-sm rounded-3xl shadow-xl overflow-hidden flex flex-col p-6" onClick={e => e.stopPropagation()}>
                                    <h3 className="font-bold text-gray-900 dark:text-white text-xl mb-4 text-center">Tambah Hutang Baru</h3>
                                    <form onSubmit={addNewDebt} className="space-y-4">
                                        <input name="debtName" type="text" placeholder="Nama Hutang (mis. Paylater, Pinjaman Bank)" className="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none" required />
                                        <input name="debtAmount" type="text" onChange={(e)=>{const v=e.target.value.replace(/\D/g,''); e.target.value=v?parseInt(v).toLocaleString('id-ID'):'';}} placeholder="Total Jumlah (Rp)" className="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none font-bold text-red-600" required />
                                        <div className="flex gap-3 pt-2">
                                            <button type="button" onClick={() => setIsAddDebtModal(false)} className="flex-1 py-3 bg-gray-100 dark:bg-gray-700 rounded-xl font-bold">Batal</button>
                                            <button type="submit" className="flex-1 py-3 bg-theme text-white rounded-xl font-bold">Tambah</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS MODAL */}
                        {isSettingsOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white dark:bg-gray-900 w-full max-w-sm rounded-3xl p-6 shadow-2xl flex flex-col max-h-[90vh] border border-gray-100 dark:border-gray-800">
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-bold text-gray-900 dark:text-white">{isEditMode ? 'Edit Data' : 'Pengaturan'}</h2>
                                    <button onClick={() => { setIsSettingsOpen(false); setIsEditMode(false); }} className="p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white bg-gray-100 dark:bg-gray-800 rounded-full transition-colors"><XIcon className="w-5 h-5" /></button>
                                </div>

                                <div className="overflow-y-auto flex-1 pb-4 pr-1">
                                    {isEditMode ? (
                                        <div className="space-y-3">
                                            <button onClick={() => setIsEditMode(false)} className="text-blue-500 text-sm font-semibold mb-4 flex items-center"><ChevronLeft className="w-4 h-4 mr-1"/> Kembali</button>
                                            {expenses.map(exp => (
                                                <div key={exp.id} className="flex gap-2 items-center bg-gray-50 dark:bg-gray-800 p-2.5 rounded-xl border border-gray-100 dark:border-gray-700">
                                                    <input defaultValue={exp.description} onBlur={(e) => handleEditExpense(exp.id, 'description', e.target.value)} className="flex-1 w-full bg-white dark:bg-gray-900 px-2 py-1.5 rounded border border-gray-200 dark:border-gray-700 text-sm" />
                                                    <input defaultValue={exp.amount} onBlur={(e) => handleEditExpense(exp.id, 'amount', parseInt(e.target.value.replace(/\D/g, '')) || 0)} className="w-20 bg-white dark:bg-gray-900 px-2 py-1.5 rounded border border-gray-200 dark:border-gray-700 text-sm font-bold" />
                                                    <button onClick={() => handleDeleteExpense(exp.id)} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded"><Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            ))}
                                            {expenses.length === 0 && <p className="text-center text-gray-400 text-sm italic">Kosong</p>}
                                        </div>
                                    ) : (
                                        <div className="space-y-5">
                                            {!isStandalone && (
                                                <button onClick={handleInstallApp} className="w-full flex items-center justify-center gap-2 py-3.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl font-bold shadow-lg hover:scale-[0.98] transition-all mb-2">
                                                    <DownloadIcon className="w-5 h-5" /> Download Web App
                                                </button>
                                            )}

                                            <div className="bg-theme/10 rounded-2xl p-4 border border-theme/20 flex items-center gap-4">
                                                <div className="flex-1">
                                                    <h3 className="font-black text-theme text-xl leading-tight mb-1 uppercase tracking-wide">{userProfile.name}</h3>
                                                    <p className="text-theme/70 text-sm font-semibold mb-2">{userProfile.age} Tahun</p>
                                                </div>
                                                <div className="w-[60px] h-[80px] rounded-lg bg-white dark:bg-gray-800 border-2 border-theme/30 flex items-center justify-center text-3xl shadow-sm shrink-0">{userProfile.gender === 'male' ? '👨' : '👩'}</div>
                                            </div>

                                            <button onClick={() => setIsEditMode(true)} className="w-full flex items-center justify-center gap-2 py-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-xl font-bold border border-blue-100 dark:border-blue-800 transition-colors">
                                                <Edit3 className="w-4 h-4" /> Edit Data Transaksi
                                            </button>

                                            <div className="space-y-3 pt-2">
                                                <h4 className="font-bold text-gray-900 dark:text-white text-sm uppercase">Tampilan & Tema</h4>
                                                
                                                <div className="flex bg-gray-100 dark:bg-gray-800 rounded-xl p-1">
                                                    {['light', 'system', 'dark'].map(t => (
                                                        <button key={t} onClick={() => setAppSettings({...appSettings, theme: t})} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all capitalize ${appSettings.theme === t ? 'bg-white dark:bg-gray-600 shadow-sm text-theme' : 'text-gray-500'}`}>{t}</button>
                                                    ))}
                                                </div>

                                                <label className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 cursor-pointer overflow-hidden relative">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-full bg-theme flex items-center justify-center text-white"><ImageInfo className="w-4 h-4" /></div>
                                                        <span className="text-sm font-semibold">Tema Kustom (Galeri)</span>
                                                    </div>
                                                    <input type="file" accept="image/*" onChange={handleImageUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                                </label>
                                                {appSettings.customColor && (
                                                    <button onClick={() => setAppSettings({...appSettings, customColor: null})} className="text-[11px] text-red-500 font-bold w-full text-right pr-2">Reset Warna Tema</button>
                                                )}
                                            </div>

                                            <div className="space-y-3 pt-2">
                                                <h4 className="font-bold text-gray-900 dark:text-white text-sm uppercase">Fitur Tab</h4>
                                                {['spending', 'income', 'debt'].map(key => (
                                                    <label key={key} className="flex items-center justify-between px-3 py-2 bg-gray-50 dark:bg-gray-800 rounded-xl cursor-pointer">
                                                        <span className="text-sm font-medium capitalize">{key === 'spending' ? 'Pengeluaran' : key === 'income' ? 'Pemasukan' : 'Hutang'}</span>
                                                        <input type="checkbox" checked={appSettings.tracks[key]} onChange={e => setAppSettings({...appSettings, tracks:{...appSettings.tracks, [key]: e.target.checked}})} className="w-5 h-5 text-theme rounded focus:ring-theme" />
                                                    </label>
                                                ))}
                                                <label className="flex flex-col px-3 py-2 bg-gray-50 dark:bg-gray-800 rounded-xl">
                                                    <span className="text-xs font-bold text-gray-500 mb-1">Tab Utama (Default)</span>
                                                    <select value={appSettings.defaultTab} onChange={e=>setAppSettings({...appSettings, defaultTab: e.target.value})} className="bg-transparent font-bold text-theme outline-none">
                                                        {activeTabs.map(t => <option key={t} value={t} className="text-black">{t}</option>)}
                                                    </select>
                                                </label>
                                            </div>

                                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 py-4 bg-red-50 dark:bg-red-900/20 text-red-600 rounded-xl font-bold border border-red-100 dark:border-red-900 mt-8 transition-colors">
                                                <LogOutIcon className="w-5 h-5" /> Log Out
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
