                                            <h3 className="text-center font-bold text-gray-800 uppercase tracking-widest text-lg">List Pengeluaran</h3>
                                            <p className="text-center text-xs text-gray-500 mt-1 font-semibold">{selectedDateReceipt.dateStr}</p>
                                        </div>
                                        <div className="p-5 flex-1 overflow-y-auto bg-white">
                                            {(() => {
                                                const dayExps = expenses.filter(exp => 
                                                    exp.type !== 'income' && 
                                                    new Date(exp.date).toDateString() === new Date(new Date().getFullYear(), new Date().getMonth() + currentMonthOffset, selectedDateReceipt.day).toDateString()
                                                );
                                                return (
                                                    <div className="space-y-3">
                                                        {dayExps.map(exp => (
                                                            <div key={exp.id} className="flex justify-between items-center text-sm">
                                                                <span className="text-gray-600">{exp.description}</span>
                                                                <span className="font-semibold text-gray-800">
                                                                    -Rp {formatNumber(exp.amount)}
                                                                </span>
                                                            </div>
                                                        ))}
                                                        {dayExps.length === 0 && <p className="text-center text-gray-400 text-sm italic">Tidak ada transaksi.</p>}
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                        <div className="bg-white p-5 pt-0 shrink-0">
                                            <div className="border-t border-gray-200 pt-4 flex justify-between font-bold text-sm">
                                                <span className="text-gray-600">Total Pengeluaran</span>
                                                <span className="text-red-600">-Rp {formatNumber(selectedDateReceipt.dailyExpense)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS / EDIT MODAL */}
                        {isSettingsOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-in fade-in zoom-in-95 duration-200 flex flex-col max-h-[90vh]">
                                
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <h2 className="text-xl font-bold text-gray-900">{isEditMode ? 'Edit Transaksi' : 'Pengaturan'}</h2>
                                    <button onClick={() => { setIsSettingsOpen(false); setIsEditMode(false); }} className="p-1 text-gray-400 hover:text-gray-800">
                                        <X className="w-6 h-6" />
                                    </button>
                                </div>

                                <div className="overflow-y-auto flex-1 pb-4">
                                    {isEditMode ? (
                                        <div className="space-y-3">
                                            <button onClick={() => setIsEditMode(false)} className="text-blue-500 text-sm font-semibold mb-2 flex items-center"><ChevronLeft className="w-4 h-4 mr-1"/> Kembali</button>
                                            {expenses.map(exp => (
                                                <div key={exp.id} className="flex gap-2 items-center bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                                                    <input 
                                                        defaultValue={exp.description} 
                                                        onBlur={(e) => handleEditExpense(exp.id, 'description', e.target.value)} 
                                                        className="flex-1 w-full bg-white px-2 py-1.5 rounded border border-gray-200 text-[16px]"
                                                    />
                                                    <input 
                                                        defaultValue={exp.amount} 
                                                        onBlur={(e) => handleEditExpense(exp.id, 'amount', parseInt(e.target.value.replace(/\D/g, '')) || 0)} 
                                                        className={`w-20 bg-white px-2 py-1.5 rounded border border-gray-200 text-[16px] font-semibold ${exp.type === 'income' ? 'text-green-600' : 'text-gray-800'}`}
                                                    />
                                                    <button onClick={() => handleDeleteExpense(exp.id)} className="p-2 text-red-500 hover:bg-red-50 rounded">
                                                        <Trash2 className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            ))}
                                            {expenses.length === 0 && <p className="text-center text-gray-400 text-sm mt-4">Kosong</p>}
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="bg-[#e0f2fe] rounded-lg p-5 shadow-sm border border-[#bae6fd] relative flex items-center">
                                                <div className="flex-1 pr-4 z-10">
                                                    <h3 className="font-bold text-[#0c4a6e] text-xl leading-tight mb-0.5 uppercase tracking-wide">
                                                        {userProfile.name}
                                                    </h3>
                                                    <p className="text-[#0284c7] text-sm font-semibold mb-3">
                                                        {userProfile.age} Tahun
                                                    </p>
                                                    <p className="text-[#0369a1] text-[10px] font-medium italic leading-snug border-l-2 border-[#7dd3fc] pl-2">
                                                        "Aku adalah orang yang disiplin finansial"
                                                    </p>
                                                </div>
                                                <div className="w-[60px] h-[80px] rounded-md bg-white border-2 border-[#bae6fd] flex items-center justify-center text-4xl shadow-sm z-10 shrink-0">
                                                    {userProfile.gender === 'male' ? '👨' : '👩'}
                                                </div>
                                            </div>

                                            <button 
                                                onClick={() => setIsEditMode(true)}
                                                className="w-full flex items-center justify-center gap-2 py-3 bg-blue-50 text-blue-600 rounded-xl font-semibold border border-blue-100 hover:bg-blue-100 transition-colors"
                                            >
                                                <Edit3 className="w-4 h-4" /> Edit Data Transaksi
                                            </button>

                                            <label className="flex flex-col p-3 bg-gray-50 rounded-xl">
                                                <span className="text-sm font-semibold text-gray-700 mb-1">Target Harian (Rp)</span>
                                                <input 
                                                    type="text"
                                                    value={userProfile.promiseBudget ? parseInt(userProfile.promiseBudget).toLocaleString('id-ID') : ''}
                                                    onChange={(e) => {
                                                        const rawValue = e.target.value.replace(/\D/g, '');
                                                        setUserProfile({...userProfile, promiseBudget: rawValue ? parseInt(rawValue) : ''});
                                                    }}
                                                    onBlur={handleUpdateProfile}
                                                    className="px-3 py-2 border border-gray-200 rounded-lg text-[16px] bg-white"
                                                    placeholder="Contoh: 50000"
                                                />
                                            </label>

                                            <label className="flex flex-col p-3 bg-gray-50 rounded-xl">
                                                <span className="text-sm font-semibold text-gray-700 mb-1">Anggaran Bulanan (Rp)</span>
                                                <input 
                                                    type="text"
                                                    value={budget ? parseInt(budget).toLocaleString('id-ID') : ''}
                                                    onChange={(e) => {
                                                        const rawValue = e.target.value.replace(/\D/g, '');
                                                        setBudget(rawValue ? parseInt(rawValue) : 0);
                                                    }}
                                                    onBlur={handleUpdateProfile}
                                                    className="px-3 py-2 border border-gray-200 rounded-lg text-[16px] bg-white"
                                                />
                                            </label>

                                            <label className="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer">
                                                <span className="text-sm font-semibold text-gray-700">Tampilkan Splash Screen</span>
                                                <input 
                                                    type="checkbox" 
                                                    checked={appSettings.showSplash}
                                                    onChange={(e) => setAppSettings({...appSettings, showSplash: e.target.checked})}
                                                    className="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300"
                                                />
                                            </label>

                                            <label className="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer">
                                                <span className="text-sm font-semibold text-gray-700">Tampilkan Waktu</span>
                                                <input 
                                                    type="checkbox" 
                                                    checked={appSettings.showTime}
                                                    onChange={(e) => setAppSettings({...appSettings, showTime: e.target.checked})}
                                                    className="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300"
                                                />
                                            </label>
                                            
                                            <label className="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer mb-6">
                                                <span className="text-sm font-semibold text-gray-700">Peringatan Harian</span>
                                                <input 
                                                    type="checkbox" 
                                                    checked={appSettings.showRecap}
                                                    onChange={(e) => setAppSettings({...appSettings, showRecap: e.target.checked})}
                                                    className="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300"
                                                />
                                            </label>

                                            <button 
                                                onClick={handleLogout}
                                                className="w-full flex items-center justify-center gap-2 py-3 bg-red-50 text-red-600 rounded-xl font-bold border border-red-100 hover:bg-red-100 transition-colors mt-8"
                                            >
                                                <LogOut className="w-5 h-5" /> Log Out
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
