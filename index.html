<head>

    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gray: {
                50: '#fafafa',
                100: '#f5f5f5',
                200: '#e5e5e5',
                300: '#d4d4d4',
                400: '#a3a3a3',
                500: '#737373',
                600: '#525252',
                700: '#404040',
                800: '#262626',
                900: '#171717',
                950: '#0a0a0a',
              }
            }
          }
        }
      }
    </script>
    
    <style>
        /* Mengunci layar agar tidak bounce oleh Safari/Chrome */
        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            touch-action: pan-x pan-y;
            overscroll-behavior-y: none;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease;
        }

        .dark body {
            background-color: #0a0a0a; /* neutral-950 */
        }

        #root {
            width: 100%; height: 100%;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.25; }
        }
        .animate-breathe {
            animation: breathe 3s ease-in-out infinite;
        }
        
        /* Animasi iOS Dropdown PWA */
        @keyframes slideDownNotif {
            from { transform: translateY(-150%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-down-notif {
            animation: slideDownNotif 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .pb-safe { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .bottom-safe-capsule { bottom: max(24px, env(safe-area-inset-bottom, 24px)); }
        ::-webkit-scrollbar { display: none; }
        input[type="text"], input[type="number"], input[type="date"], select { font-size: 16px !important; }

        .receipt-mask {
            padding-top: 12px; padding-bottom: 12px;
            --mask: 
                conic-gradient(from -45deg at bottom, #0000, #000 1deg 89deg, #0000 90deg) 50% 100% / 12px 51% repeat-x,
                conic-gradient(from 135deg at top, #0000, #000 1deg 89deg, #0000 90deg) 50% 0% / 12px 51% repeat-x;
            -webkit-mask: var(--mask);
                    mask: var(--mask);
        }

        /* Splash Screen Animation Styles */
        @import url("https://fonts.googleapis.com/css2?family=Heebo:wght@900&display=swap");
        :root {
            --splash-duration: 4s;
            --splash-wave-duration: calc(var(--splash-duration) * 0.25);
            --splash-text-in-delay: calc(var(--splash-duration) * 0.275);
            --splash-text-in-duration: calc(var(--splash-duration) * 0.1);
            --splash-easing: cubic-bezier(0.5, 0, 0.5, 1);
            --splash-dot-color: #6ee16e;
            --splash-dot-color-dark: #2f6b2f;
        }
        .splash-wrapper { height: 100dvh; width: 100vw; margin: 0; padding: 0; background: #ffffff; color: black; font-family: "Heebo", sans-serif; overflow: hidden; display: flex; flex-direction: row; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; z-index: 99999; }
        @media (prefers-color-scheme: dark) { .splash-wrapper { background: #0a0a0a; color: white; } .splash-title .char[data-char="u"]::before, .splash-title .char[data-char="U"]::before { color: white !important; } }
        .splash-wrapper * { box-sizing: border-box; position: relative; }
        .splash-container { display: grid; align-items: center; justify-items: center; }
        .splash-container > * { grid-area: 1 / 1; }
        .splash-title { font-size: 10vmin; margin: 0; font-family: Arial, sans-serif; font-weight: bold; }
        .splash-title .char { --char-offset: calc(var(--char-index) - (var(--char-total) / 2)); --distance-percent: calc(var(--char-index) / var(--char-total)); --delay: calc(var(--splash-text-in-delay) + (0.25s * (1 - var(--distance-percent)))); animation: splash-text-in var(--splash-text-in-duration) var(--splash-easing) var(--delay) backwards; transform-origin: center 1em; display: inline-block; }
        @keyframes splash-text-in { 0% { opacity: 0; transform: translateX(calc(-0.4em * var(--char-offset))) scale(0); } 90% { transform: translateX(0em) scale(1.1); } }
        .splash-title .char[data-char="u"], .splash-title .char[data-char="U"] { visibility: hidden; --squish-scale: 0.6; --squish-y: 10%; }
        .splash-title .char[data-char="u"]::before, .splash-title .char[data-char="U"]::before { content: attr(data-char); visibility: visible; position: absolute; left: 0; top: 0; animation: splash-text-squish var(--splash-duration) var(--splash-easing) forwards; color: black; transform-origin: center 1em; }
        @keyframes splash-text-squish { 47.5%, 52.5% { transform: none; } 50% { transform: translateY(calc(var(--squish-y) * 1)) scaleY(calc(var(--squish-scale) * 1)); } }
        .splash-title .char:last-child { animation: splash-text-in var(--splash-text-in-duration) var(--splash-easing) var(--delay) backwards, splash-text-bonk var(--splash-duration) var(--splash-easing) forwards; }
        @keyframes splash-text-bonk { 80%, 85%, to { transform: none; } 82% { transform: translateX(-20%); } }
        .splash-dot { font-size: 5vmin; width: 1em; height: 1em; animation: splash-dot var(--splash-duration) var(--splash-easing) both; z-index: 10; }
        .splash-dot-inner { animation: splash-dot-inner var(--splash-duration) var(--splash-easing) both; content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; overflow: hidden; display: grid; align-items: center; justify-items: center; }
        .splash-dot-inner > * { grid-area: 1 / 1; }
        .splash-dot-wave { width: 200%; height: 200%; fill: var(--splash-dot-color); animation: splash-wave-in var(--splash-wave-duration) var(--splash-easing); --offset-x: -110%; }
        @keyframes splash-wave-in { 0% { transform: translateY(100%) translateX(var(--offset-x)); } 70% { transform: translateY(30%) translateX(0%); } }
        .splash-dot-wave.background { fill: var(--splash-dot-color-dark); animation-duration: calc(0.95 * var(--splash-wave-duration)); --offset-x: 110%; }
        @keyframes splash-dot { from { opacity: 0; transform: scale(3); } 10% { opacity: 1; transform: scale(3); } 15% { transform: scale(3) translateY(0.5em) scaleY(1.5); } 20% { transform: scale(1) translateY(-300%); } 30% { transform: translateY(1em) scaleY(0.5); } 40% { transform: translateY(-400%); } 50% { transform: translateY(-1em); } 53% { transform: translateY(-300%); } 56% { transform: translateY(-1em); } 59% { transform: translateY(-200%); } 62% { transform: translateY(1em); } 80%, 90%, to { transform: translateY(calc(0.2em + 2px)); } }
        @keyframes splash-dot-inner { from, 45% { transform: none; } 70% { transform: translateX(7em); animation-timing-function: cubic-bezier(0.5, 0, 1, 0); } 80% { transform: translateX(5.3em); animation-timing-function: var(--splash-easing); } 83%, to { transform: translateX(5.4em); } }
    </style>
</head>
<body>

        // ==========================================

        const PWANotif = ({ show, onInstall, onClose }) => {
            return (
                <div className={`fixed top-4 left-0 right-0 z-[100000] px-4 flex justify-center transition-all duration-500 transform ${show ? 'translate-y-0 opacity-100' : '-translate-y-[150%] opacity-0 pointer-events-none'}`}>

                        <div className="w-12 h-12 rounded-[12px] bg-gray-100 dark:bg-gray-900 overflow-hidden flex-shrink-0 shadow-inner">

                        </div>
                        <button onClick={onInstall} className="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white text-[13px] font-bold py-1.5 px-4 rounded-full shadow-md transition-all">
                            Get
                        </button>
                        <button onClick={onClose} className="p-1.5 text-gray-400 dark:text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full ml-1 transition-colors">
                            <XIcon className="w-4 h-4" />
                        </button>
                    </div>
                </div>
            );
        };

        // --- SPLASH SCREEN COMPONENT ---
        const SplashScreen = ({ onComplete }) => {
            const titleRef = useRef(null);
            const [isFading, setIsFading] = useState(false);

            useEffect(() => {
                if (window.Splitting && titleRef.current) {
                    window.Splitting({ target: titleRef.current, by: 'chars' });
                }

                const fadeTimer = setTimeout(() => setIsFading(true), 4000); 
                const removeTimer = setTimeout(() => onComplete(), 4500); 

                return () => {
                    clearTimeout(fadeTimer);
                    clearTimeout(removeTimer);
                };
            }, [onComplete]);

            return (
                <div 
                    className="splash-wrapper" 
                    onClick={() => {
                        setIsFading(true);
                        setTimeout(onComplete, 500);
                    }}
                    style={{ 
                        opacity: isFading ? 0 : 1, 
                        transition: 'opacity 0.5s ease-in-out',
                        cursor: 'pointer'
                    }}
                >
                    <div className="splash-container">
                        <h1 className="splash-title" ref={titleRef}>JeStudios</h1>
                        <div className="splash-dot">
                            <div className="splash-dot-inner">
                                <svg className="splash-dot-wave background" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
                                    <path d="M799.09 90s11.04 0 0 0c-80.714 0-79.621-90-200-90-120.377 0-118.607 90-200 90-81.391 0-81.215-90-200-90C80.308 0 78.68 89.29-.91 90c-6.946.062 0 0 0 0v510h800V90z" />
                                </svg>
                                <svg className="splash-dot-wave foreground" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
                                    <path d="M799.09 90s11.04 0 0 0c-80.714 0-79.621-90-200-90-120.377 0-118.607 90-200 90-81.391 0-81.215-90-200-90C80.308 0 78.68 89.29-.91 90c-6.946.062 0 0 0 0v510h800V90z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AnimatedNumber = ({ value, formatFn }) => {
            const [displayValue, setDisplayValue] = useState(value);
            const startValue = useRef(value);

            useEffect(() => {
                let start = displayValue;
                let end = value;
                if (start === end) return;

                const duration = 2500; 
                let startTime = null;
                let animationFrame;

                const animate = (time) => {
                    if (!startTime) startTime = time;
                    const progress = Math.min((time - startTime) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const currentVal = start + (end - start) * easeOut;
                    
                    setDisplayValue(currentVal);

                    if (progress < 1) {
                        animationFrame = requestAnimationFrame(animate);
                    } else {
                        setDisplayValue(end);
                        startValue.current = end;
                    }
                };

                animationFrame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationFrame);
            }, [value]);

            return <span>{formatFn(Math.round(displayValue))}</span>;
        };

        const App = () => {
            const [appSettings, setAppSettings] = useState(() => {
                const saved = localStorage.getItem('app_settings');
                const parsed = saved ? JSON.parse(saved) : { showTime: false, showRecap: true, showSplash: true, themeMode: 'system', customTheme: null, customThemeImage: null, themeLuminance: null };
                if (parsed.showSplash === undefined) parsed.showSplash = true;
                if (!parsed.themeMode) parsed.themeMode = 'system';
                return parsed;
            });
            const [isSplashVisible, setIsSplashVisible] = useState(appSettings.showSplash);

            // --- Theme Enforcement Logic ---
            useEffect(() => {
                const root = document.documentElement;
                const applyDark = () => root.classList.add('dark');
                const applyLight = () => root.classList.remove('dark');

                if (appSettings.themeMode === 'custom' && appSettings.customThemeImage && appSettings.themeLuminance) {
                    if (appSettings.themeLuminance === 'dark') applyDark();
                    else applyLight();
                } else {
                    if (appSettings.themeMode === 'dark') {
                        applyDark();
                    } else if (appSettings.themeMode === 'light') {
                        applyLight();
                    } else {
                        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyDark();
                        else applyLight();
                    }
                }

                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleChange = (e) => {
                    if (appSettings.themeMode === 'system') {
                        if (e.matches) applyDark();
                        else applyLight();
                    }
                };
                mediaQuery.addEventListener('change', handleChange);
                return () => mediaQuery.removeEventListener('change', handleChange);
            }, [appSettings.themeMode, appSettings.customThemeImage, appSettings.themeLuminance]);

            // --- Cloud States ---
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [uid, setUid] = useState(''); 
            const [loginStep, setLoginStep] = useState('auth'); 

            // --- Persistent States ---
            const [budget, setBudget] = useState(0);
            const [paycheckDate, setPaycheckDate] = useState('');
            const [expenses, setExpenses] = useState([]);
            const [userProfile, setUserProfile] = useState({ name: '', age: '', gender: '', promiseBudget: '', createdAt: '', trackedItems: ['spending'], defaultTab: 'spending', debts: [], quote: 'Aku adalah orang yang disiplin finansial', avatar: null });

            // --- UI States ---
            const [setupStep, setSetupStep] = useState(1);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [editModeType, setEditModeType] = useState('spending');
            const [isScrolled, setIsScrolled] = useState(false);
            const [currentView, setCurrentView] = useState('home'); 
            const [activeTab, setActiveTab] = useState('spending');
            
            // Debt-specific Modals & States
            const [isDebtExpanded, setIsDebtExpanded] = useState(false);
            const [isAddDebtModalOpen, setIsAddDebtModalOpen] = useState(false);
            const [newDebtType, setNewDebtType] = useState('tagihan'); // 'tagihan' or 'cicilan'
            const [newDebtName, setNewDebtName] = useState('');
            const [newDebtAmount, setNewDebtAmount] = useState('');
            const [newDebtDeadline, setNewDebtDeadline] = useState('');
            const [newDebtStartDate, setNewDebtStartDate] = useState('');
            const [newDebtTenor, setNewDebtTenor] = useState('');
            const [selectedDebtId, setSelectedDebtId] = useState('');

            useEffect(() => {
                if (userProfile.defaultTab && userProfile.trackedItems?.includes(userProfile.defaultTab)) {
                    setActiveTab(userProfile.defaultTab);
                } else if (userProfile.trackedItems?.length > 0) {
                    setActiveTab(userProfile.trackedItems[0]);
                }
            }, [userProfile.defaultTab, userProfile.trackedItems]);
            
            // Calendar Animation States
            const [currentMonthOffset, setCurrentMonthOffset] = useState(0); 
            const [isAnimatingMonth, setIsAnimatingMonth] = useState(false);
            const [monthAnimDir, setMonthAnimDir] = useState(0); // -1 = up, 1 = down
            
            // Interaction States
            const [touchStartPos, setTouchStartPos] = useState({x: null, y: null});
            const [touchEndPos, setTouchEndPos] = useState({x: null, y: null});
            
            // Input States
            const [amountInput, setAmountInput] = useState('');
            const [descInput, setDescInput] = useState('');

            // Modal States
            const [isIncomeModalOpen, setIsIncomeModalOpen] = useState(false);
            const [incomeAmountInput, setIncomeAmountInput] = useState('');
            const [incomeDescInput, setIncomeDescInput] = useState('');
            const [selectedDateReceipt, setSelectedDateReceipt] = useState(null);
            const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
            const [showPastInputWarning, setShowPastInputWarning] = useState(false);
            const [showSecondPastInputWarning, setShowSecondPastInputWarning] = useState(false);
            const [customExpenseDate, setCustomExpenseDate] = useState('');
            
            useEffect(() => {
                const today = new Date();
                const tzoffset = today.getTimezoneOffset() * 60000;
                setCustomExpenseDate((new Date(today - tzoffset)).toISOString().slice(0, 10));
            }, []);
            
            const [isTakingDamage, setIsTakingDamage] = useState(false);
            const [isHealing, setIsHealing] = useState(false);
            const prevRemainingRef = useRef(0);

            // ==========================================
            // PWA GLOBAL STATE & LOGIC
            // ==========================================
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isIOS, setIsIOS] = useState(false);
            const [isStandalone, setIsStandalone] = useState(false);
            const [showPWANotif, setShowPWANotif] = useState(false);

            useEffect(() => {
                const isDeviceIOS = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
                setIsIOS(isDeviceIOS);
                
                const checkStandalone = () => ('standalone' in window.navigator) && (window.navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches;
                const standaloneStatus = checkStandalone();
                setIsStandalone(standaloneStatus);

                if (standaloneStatus) {
                    setShowPWANotif(false);
                    return; // Jika aplikasi telah terinstall, logic prompt dimatikan.
                }

                const handler = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowPWANotif(true);
                };
                window.addEventListener('beforeinstallprompt', handler);

                if (isDeviceIOS) {
                    const timer = setTimeout(() => setShowPWANotif(true), 2500);
                    return () => { clearTimeout(timer); window.removeEventListener('beforeinstallprompt', handler); };
                }

                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstallApp = async (e) => {
                if(e) e.stopPropagation(); // Cegah event bubling ke atas yang bisa ditandai spam oleh Chrome
                
                if (isIOS) {
                    alert('Untuk menginstal di iOS:\n1. Tap ikon Share (kotak panah ke atas) di bawah layar.\n2. Scroll ke bawah dan pilih "Add to Home Screen".');
                    setShowPWANotif(false);
                    return;
                }
                
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        setShowPWANotif(false);
                    }
                    setDeferredPrompt(null);
                } else {
                    alert('Browser Anda memblokir notifikasi (Anti-Spam).\n\nUntuk meng-install:\nTekan menu (titik tiga) di pojok kanan atas browser, lalu pilih "Install App" / "Tambahkan ke Layar Utama".');
                }
            };

            const handleForceUpdate = () => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for(let registration of registrations) {
                            registration.update();
                        }
                    });
                }
                window.location.reload(true);
            };

            // ==========================================
            // GLOBAL KEYBOARD & FOCUS RESET LISTENER
            // ==========================================
            useEffect(() => {
                const handleFocusOut = () => {
                    setTimeout(() => {
                        window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
                        document.body.scrollTop = 0;
                    }, 50);
                };
                window.addEventListener('focusout', handleFocusOut);
                return () => window.removeEventListener('focusout', handleFocusOut);
            }, []);

            // ==========================================
            // FIREBASE INIT & AUTHENTICATION LISTENER
            // ==========================================
            useEffect(() => {
                if (!auth) {
                    setLoginStep('login');
                    return;
                }

                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setFirebaseUser(user);
                        await handleUserAuthSuccess(user);
                    } else {
                        setFirebaseUser(null);
                        setLoginStep('login');
                    }
                });
                return () => unsubscribe();
            }, []);

            // ==========================================
            // DATA FETCHING
            // ==========================================
            useEffect(() => {
                if (!firebaseUser || loginStep !== 'app' || !uid || !db) return;
                
                const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid);
                const unsubscribe = onSnapshot(expensesRef, (snapshot) => {
                    const exps = [];
                    snapshot.forEach(doc => exps.push({ id: doc.id, ...doc.data() }));
                    exps.sort((a,b) => new Date(b.date) - new Date(a.date));
                    setExpenses(exps);
                }, (err) => console.error("Error fetching expenses:", err));

                return () => unsubscribe();
            }, [firebaseUser, loginStep, uid]);

            // Save Settings
            useEffect(() => {
                localStorage.setItem('app_settings', JSON.stringify(appSettings));
            }, [appSettings]);

            // Track account creation date safely
            const createdAtTime = useMemo(() => {
                if (userProfile.createdAt) return new Date(userProfile.createdAt).setHours(0,0,0,0);
                if (expenses.length > 0) {
                    const oldest = expenses.reduce((old, exp) => new Date(exp.date) < new Date(old.date) ? exp : old, expenses[0]);
                    return new Date(oldest.date).setHours(0,0,0,0);
                }
                return new Date().setHours(0,0,0,0);
            }, [userProfile.createdAt, expenses]);

            // Calculate Totals strictly isolated per tracking type
            const { totalSpent, totalIncome } = useMemo(() => {
                let spent = 0;
                let inc = 0;
                expenses.forEach(e => {
                    if (e.type === 'expense') spent += e.amount;
                    if (e.type === 'income') inc += e.amount;
                });
                return { totalSpent: spent, totalIncome: inc };
            }, [expenses]);

            const remaining = budget + totalIncome - totalSpent;
            const totalPool = budget + totalIncome;
            const percentage = totalPool > 0 ? Math.max(0, Math.min(100, (remaining / totalPool) * 100)) : 0;

            useEffect(() => {
                if (remaining < prevRemainingRef.current) {
                    setIsTakingDamage(true);
                    setTimeout(() => setIsTakingDamage(false), 500); 
                } else if (remaining > prevRemainingRef.current && prevRemainingRef.current > 0) {
                    setIsHealing(true);
                    setTimeout(() => setIsHealing(false), 500);
                }
                prevRemainingRef.current = remaining;
            }, [remaining]);
            
            // Advance Debt Progress Calculation
            const debtProgress = useMemo(() => {
                const debts = userProfile.debts || [];
                let totalPrincipal = 0;
                let totalPaid = 0;
                const progressMap = {};

                debts.forEach(d => {
                    totalPrincipal += d.amount;
                    progressMap[d.id] = { ...d, paid: 0 };
                });

                expenses.filter(e => e.type === 'debt').forEach(e => {
                    if (e.debtId && progressMap[e.debtId]) {
                        progressMap[e.debtId].paid += e.amount;
                        totalPaid += e.amount;
                    }
                });

                return {
                    totalPrincipal,
                    totalPaid,
                    remaining: Math.max(0, totalPrincipal - totalPaid),
                    list: Object.values(progressMap)
                };
            }, [userProfile.debts, expenses]);
            
            // Auto-select first unpaid debt
            useEffect(() => {
                if (activeTab === 'debt' && !selectedDebtId && debtProgress.list.length > 0) {
                    const firstUnpaid = debtProgress.list.find(d => d.amount > d.paid);
                    if (firstUnpaid) setSelectedDebtId(firstUnpaid.id);
                }
            }, [activeTab, debtProgress.list, selectedDebtId]);

            // Calculate Nearest Debt Deadline
            const nearestDeadline = useMemo(() => {
                const now = new Date();
                now.setHours(0,0,0,0);
                let closest = null;
                let minDiff = Infinity;

                debtProgress.list.forEach(debt => {
                    if (debt.paid >= debt.amount) return; // Lunas

                    let nextDate = null;
                    if (debt.type === 'tagihan' && debt.deadline) {
                        nextDate = new Date(debt.deadline);
                    } else if (debt.type === 'cicilan' && debt.startDate) {
                        const start = new Date(debt.startDate);
                        let current = new Date(start);
                        for (let i = 0; i < (debt.tenor || 1); i++) {
                            if (current >= now || i === debt.tenor - 1) {
                                nextDate = new Date(current);
                                if(current >= now) break;
                            }
                            current.setMonth(current.getMonth() + 1);
                        }
                    }

                    if (nextDate) {
                        if (nextDate.getTime() < minDiff) {
                            minDiff = nextDate.getTime();
                            closest = { name: debt.name, date: nextDate };
                        }
                    }
                });

                return closest;
            }, [debtProgress.list]);

            const formatNumber = (amount) => {
                return new Intl.NumberFormat('id-ID').format(amount);
            };

            const formatCompact = (amount) => {
                if (amount === 0) return '0';
                return new Intl.NumberFormat('id-ID', { notation: "compact", maximumFractionDigits: 1 }).format(amount);
            };

            const formatIDDate = (isoString) => {
                if (!isoString) return '';
                const d = new Date(isoString);
                return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
            };

            const isGlass = appSettings.themeMode === 'custom' && !!appSettings.customThemeImage;

            // Comprehensive mapping of pure liquid glass & frosted styles
            const uiStyle = {
                paneHome: isGlass ? 'bg-transparent' : 'bg-gray-100 dark:bg-[#262626]',
                paneCalendar: isGlass ? 'bg-transparent backdrop-blur-xl' : 'bg-gray-100 dark:bg-[#262626]',
                header: isGlass ? 'bg-white/20 dark:bg-black/30 border-b border-white/20 dark:border-white/10' : 'bg-white dark:bg-[#171717]',
                card: isGlass ? 'bg-white/20 dark:bg-black/30 border border-white/50 dark:border-white/20 shadow-[inset_0_1px_2px_rgba(255,255,255,0.4),0_4px_16px_rgba(0,0,0,0.1)]' : 'bg-gray-50 dark:bg-[#262626] border border-gray-200 dark:border-gray-800',
                cardSoft: isGlass ? 'bg-white/20 dark:bg-black/30 border border-white/40 dark:border-white/10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.3)] text-gray-900 dark:text-gray-100' : 'bg-gray-100 dark:bg-[#262626] border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200',
                capsule: isGlass ? 'bg-white/30 dark:bg-black/40 border border-white/50 dark:border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.2),inset_0_1px_2px_rgba(255,255,255,0.5)]' : 'bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border border-gray-200/80 dark:border-gray-700/80 shadow-[0_8px_30px_rgb(0,0,0,0.12)]',
                modalFrosted: isGlass ? 'bg-white/20 dark:bg-black/40 backdrop-blur-2xl border border-white/50 dark:border-white/20 shadow-[0_16px_40px_rgba(0,0,0,0.3),inset_0_1px_2px_rgba(255,255,255,0.5)]' : 'bg-white dark:bg-[#171717] shadow-2xl',
                input: isGlass ? 'bg-white/30 dark:bg-black/30 border border-white/50 dark:border-white/20 placeholder-gray-600 dark:placeholder-gray-400 focus:bg-white/40 dark:focus:bg-black/40 text-gray-900 dark:text-white shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)]' : 'bg-white dark:bg-[#171717] border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white',
                divider: isGlass ? 'bg-white/40 dark:bg-white/20' : 'bg-gray-300 dark:bg-gray-600'
            };

            const getProgressColor = (pct) => {
                const hue = 120 - (pct * 0.9); // 100% -> 30 (orange), 0% -> 120 (green)
                return `hsl(${hue}, 85%, 45%)`;
            };

            const getBarStyle = () => {
                if (percentage === 0) return { backgroundColor: 'transparent', width: '0%' };
                if (isGlass && percentage > 20) {
                    return { backgroundColor: 'var(--theme-main)', width: `${percentage}%`, transitionDuration: '2.5s' };
                }
                const hue = percentage > 50 ? 120 : (percentage / 50) * 120;
                return { backgroundColor: `hsl(${hue}, 85%, 45%)`, width: `${percentage}%`, transitionDuration: '2.5s' };
            };

            const getGlowStyle = () => {
                let defaultGlow = isScrolled ? 'rgba(34, 197, 94, 0.4)' : 'rgba(34, 197, 94, 0.5)';
                let activeGlow = percentage === 100 ? defaultGlow : 'none';
                if (isHealing) activeGlow = 'rgba(34, 197, 94, 0.8)';
                
                if (isGlass && percentage > 20) {
                    if (percentage === 100) activeGlow = 'var(--theme-glow)';
                    if (isHealing) activeGlow = 'var(--theme-glow-strong)';
                }
                return activeGlow !== 'none' ? `0 0 25px 6px ${activeGlow}` : 'none';
            };

            const getTimeIcon = (dateStr) => {
                const hour = new Date(dateStr).getHours();
                const isBrightCustom = isGlass && appSettings.themeLuminance === 'light';
                const iconColor = isBrightCustom ? "text-gray-900" : "text-gray-400 dark:text-gray-500";
                
                if (hour >= 5 && hour < 11) return <Sunrise className={`w-4 h-4 ${iconColor}`} />;
                if (hour >= 11 && hour < 15) return <Sun className={`w-4 h-4 ${iconColor}`} />;
                if (hour >= 15 && hour < 18) return <Sunset className={`w-4 h-4 ${iconColor}`} />;
                return <Moon className={`w-4 h-4 ${iconColor}`} />;
            };

            const { daysLeft, dailyAllowance, yesterdayRecap } = useMemo(() => {
                const today = new Date();
                const actualPaycheckDate = paycheckDate || 1;
                let nextPaycheck = new Date(today.getFullYear(), today.getMonth(), actualPaycheckDate);
                if (today.getDate() >= actualPaycheckDate) {
                    nextPaycheck.setMonth(nextPaycheck.getMonth() + 1);
                }
                const diffTime = nextPaycheck.getTime() - today.getTime();
                let days = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (days === 0) days = 1; 
                
                const allowance = remaining / days;

                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                
                const yesterdayExpenses = expenses.filter(exp => new Date(exp.date).toDateString() === yesterday.toDateString() && exp.type === 'expense');
                
                // Net spent yesterday (Only consider expenses for budgeting allowance)
                const yesterdaySpent = yesterdayExpenses.reduce((s, e) => s + e.amount, 0);
                
                const yesterdayRemaining = remaining + yesterdaySpent;
                const yesterdayAllowance = yesterdayRemaining / (days + 1);
                const diff = yesterdayAllowance - yesterdaySpent;
                
                let recap = null;
                if (yesterdaySpent > 0 || diff < 0) {
                    recap = { overspent: diff < 0, amount: Math.abs(diff), spent: yesterdaySpent };
                }

                return { daysLeft: days, dailyAllowance: allowance, yesterdayRecap: recap };
            }, [remaining, paycheckDate, expenses]);

            const groupedExpenses = useMemo(() => {
                const groups = {};
                const validTypes = activeTab === 'spending' ? ['expense'] : ['debt', 'debt_added'];
                
                expenses.filter(exp => validTypes.includes(exp.type)).forEach(exp => {
                    const date = new Date(exp.date);
                    const today = new Date();
                    const yesterday = new Date(today);
                    yesterday.setDate(yesterday.getDate() - 1);

                    let dateKey = date.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
                    if (date.toDateString() === today.toDateString()) dateKey = "Hari Ini";
                    else if (date.toDateString() === yesterday.toDateString()) dateKey = "Kemarin";

                    if (!groups[dateKey]) groups[dateKey] = [];
                    groups[dateKey].push(exp);
                });
                return groups;
            }, [expenses, activeTab]);

            const calendarData = useMemo(() => {
                const today = new Date();
                const targetMonth = new Date(today.getFullYear(), today.getMonth() + currentMonthOffset, 1);
                const year = targetMonth.getFullYear();
                const month = targetMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const days = [];
                let totalSpentMonth = 0;

                for (let d = 1; d <= daysInMonth; d++) {
                    const currentDate = new Date(year, month, d);
                    const dateStr = currentDate.toDateString();
                    
                    const dayExps = expenses.filter(exp => new Date(exp.date).toDateString() === dateStr);
                    
                    let dailyTotal = 0;
                    if (activeTab === 'spending') {
                        dailyTotal = dayExps.filter(e => e.type === 'expense').reduce((sum, exp) => sum + exp.amount, 0);
                    } else if (activeTab === 'debt') {
                        dailyTotal = dayExps.filter(e => e.type === 'debt').reduce((sum, exp) => sum + exp.amount, 0);
                        const added = dayExps.filter(e => e.type === 'debt_added').reduce((sum, exp) => sum + exp.amount, 0);
                        var dailyDebtAdded = added;
                    }
                    
                    totalSpentMonth += dailyTotal;
                    
                    const isFuture = currentDate.setHours(0,0,0,0) > new Date().setHours(0,0,0,0);
                    const isBeforeStart = currentDate.setHours(0,0,0,0) < createdAtTime;
                    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();

                    days.push({
                        day: d,
                        dailyExpense: dailyTotal,
                        dailyDebtAdded: dailyDebtAdded || 0,
                        isToday,
                        isFuture,
                        isBeforeStart,
                        dateStr: currentDate.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' })
                    });
                }

                return { 
                    days, 
                    monthName: targetMonth.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }),
                    totalSpentMonth 
                };
            }, [expenses, currentMonthOffset, createdAtTime, activeTab]);

            // ==========================================
            // ACTIONS (Auth & Settings)
            // ==========================================
            const handleUserAuthSuccess = async (user) => {
                try {
                    setUid(user.uid);

                    if (!db) { 
                        setLoginStep('setup');
                        return; 
                    }

                    const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', user.uid);
                    const snap = await getDoc(profileRef);

                    if (snap.exists()) {
                        const data = snap.data();
                        if (!data.trackedItems) data.trackedItems = ['spending'];
                        if (!data.defaultTab) data.defaultTab = 'spending';
                        setUserProfile(data);
                        setBudget(data.budget || 0);
                        setPaycheckDate(data.paycheckDate || 1);
                        setLoginStep('app');
                    } else {
                        setUserProfile(prev => ({...prev, name: user.displayName || '', trackedItems: ['spending'], defaultTab: 'spending'}));
                        setLoginStep('setup');
                    }
                } catch (error) {
                    console.error("Auth Data Error:", error);
                    alert("Koneksi ditolak oleh Firebase. Pastikan Rules Anda mengizinkan proses Read/Write untuk user yang telah login.");
                    setLoginStep('setup'); 
                }
            };

            const handleGoogleLogin = async () => {
                if (!auth) return;
                const provider = new GoogleAuthProvider();
                try {
                    setLoginStep('auth');
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    alert("Gagal login dengan Google: " + error.message);
                    setLoginStep('login');
                }
            };

            const handleGuestLogin = async () => {
                if (!auth) return;
                try {
                    setLoginStep('auth');
                    await signInAnonymously(auth);
                } catch (error) {
                    alert("Gagal login sebagai guest: " + error.message);
                    setLoginStep('login');
                }
            };

            const handleLogout = async () => {
                if (auth) await signOut(auth);
                setFirebaseUser(null);
                setUid('');
                setLoginStep('login');
                setIsSettingsOpen(false);
            };

            const handleFinishSetup = async (e) => {
                e.preventDefault();
                const actualPaycheckDate = paycheckDate || 1;
                const finalProfile = { 
                    ...userProfile, 
                    budget, 
                    paycheckDate: actualPaycheckDate,
                    createdAt: userProfile.createdAt || new Date().toISOString()
                };
                
                if (db) {
                    try {
                        const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', uid);
                        await setDoc(profileRef, finalProfile);
                    } catch (e) {
                        console.error("Set Doc Error:", e);
                    }
                }
                setLoginStep('app');
            };

            const handleUpdateProfile = async (overrides = {}) => {
                if (db) {
                    const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', uid);
                    const finalProfile = { ...userProfile, budget, paycheckDate, ...overrides };
                    await setDoc(profileRef, finalProfile, { merge: true });
                } 
            };

            const handleAddDebtPrincipal = async (e) => {
                e.preventDefault();
                const amount = parseFloat(newDebtAmount.replace(/\D/g, ''));
                if (amount > 0 && newDebtName.trim()) {
                    const newDebtId = Date.now().toString(36) + Math.random().toString(36).substr(2);
                    const newDebt = {
                        id: newDebtId,
                        name: newDebtName.trim(),
                        amount: amount,
                        type: newDebtType,
                        createdAt: new Date().toISOString()
                    };
                    if (newDebtType === 'tagihan') newDebt.deadline = newDebtDeadline;
                    if (newDebtType === 'cicilan') {
                        newDebt.startDate = newDebtStartDate;
                        newDebt.tenor = parseInt(newDebtTenor, 10);
                    }

                    const updatedDebts = [...(userProfile.debts || []), newDebt];
                    setUserProfile({...userProfile, debts: updatedDebts});
                    await handleUpdateProfile({ debts: updatedDebts });
                    
                    const debtAddedExpense = {
                        amount: amount,
                        description: `Hutang Baru: ${newDebtName.trim()}`,
                        date: new Date().toISOString(),
                        type: 'debt_added',
                        debtId: newDebtId
                    };
                    
                    if (db) {
                        const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid);
                        await addDoc(expensesRef, debtAddedExpense);
                    }
                    
                    setNewDebtName('');
                    setNewDebtAmount('');
                    setNewDebtDeadline('');
                    setNewDebtStartDate('');
                    setNewDebtTenor('');
                    setIsAddDebtModalOpen(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const MAX_DIM = 800; 
                        let width = img.width;
                        let height = img.height;
                        if (width > height && width > MAX_DIM) {
                            height *= MAX_DIM / width;
                            width = MAX_DIM;
                        } else if (height > MAX_DIM) {
                            width *= MAX_DIM / height;
                            height = MAX_DIM;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const wallpaperDataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        
                        const data = ctx.getImageData(0, 0, width, height).data;
                        let maxScore = 0;
                        let bestR = 34, bestG = 197, bestB = 94; 
                        
                        let sumR = 0, sumG = 0, sumB = 0, count = 0;

                        for (let i = 0; i < data.length; i += 40) { 
                            let r = data[i];
                            let g = data[i+1];
                            let b = data[i+2];
                            let a = data[i+3];
                            
                            if (a < 128) continue;
                            
                            sumR += r; sumG += g; sumB += b;
                            count++;
                            
                            let max = Math.max(r, g, b);
                            let min = Math.min(r, g, b);
                            let sat = max === 0 ? 0 : (max - min) / max;
                            let val = max / 255;
                            
                            let score = sat * val * 100;
                            
                            if (sat > 0.15 && val > 0.15 && score > maxScore) {
                                maxScore = score;
                                bestR = r; bestG = g; bestB = b;
                            }
                        }
                        
                        let avgR = count > 0 ? sumR / count : 255;
                        let avgG = count > 0 ? sumG / count : 255;
                        let avgB = count > 0 ? sumB / count : 255;
                        
                        let luminance = 0.299 * avgR + 0.587 * avgG + 0.114 * avgB;
                        let detectedTheme = luminance > 128 ? 'light' : 'dark';
                        
                        try {
                            setAppSettings({
                                ...appSettings, 
                                themeMode: 'custom',
                                customTheme: `rgb(${bestR}, ${bestG}, ${bestB})`, 
                                customThemeImage: wallpaperDataUrl,
                                themeLuminance: detectedTheme
                            });
                        } catch(err) {
                            console.error(err);
                            alert("Gambar terlalu besar untuk disimpan, coba gunakan gambar lain.");
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const MAX_DIM = 200; 
                        let width = img.width;
                        let height = img.height;
                        if (width > height && width > MAX_DIM) {
                            height *= MAX_DIM / width;
                            width = MAX_DIM;
                        } else if (height > MAX_DIM) {
                            width *= MAX_DIM / height;
                            height = MAX_DIM;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const avatarDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        
                        setUserProfile({...userProfile, avatar: avatarDataUrl});
                        handleUpdateProfile({ avatar: avatarDataUrl });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // ==========================================
            // DATA MUTATION
            // ==========================================
            const handleAddExpense = async (e) => {
                e.preventDefault();
                const amount = parseFloat(amountInput.replace(/\D/g, ''));
                
                if (activeTab === 'debt' && !selectedDebtId) {
                    alert("Silakan pilih hutang yang ingin dibayar.");
                    return;
                }

                if (amount > 0) {
                    let finalDesc = descInput.trim();
                    let finalType = activeTab === 'spending' ? 'expense' : activeTab;
                    let finalDebtId = null;

                    if (activeTab === 'debt') {
                        const selectedDebt = debtProgress.list.find(d => d.id === selectedDebtId);
                        if (!finalDesc) {
                            finalDesc = selectedDebt ? `Bayar: ${selectedDebt.name}` : `Bayar Hutang`;
                        }
                        finalDebtId = selectedDebtId;
                    }

                    let finalDate = new Date().toISOString();
                    if (appSettings.allowPastInput && customExpenseDate) {
                        const now = new Date();
                        const tzoffset = now.getTimezoneOffset() * 60000;
                        const todayStr = (new Date(now - tzoffset)).toISOString().slice(0, 10);
                        
                        if (customExpenseDate !== todayStr) {
                            const [year, month, day] = customExpenseDate.split('-');
                            const selected = new Date();
                            selected.setFullYear(parseInt(year), parseInt(month) - 1, parseInt(day));
                            finalDate = selected.toISOString();
                        }
                    }

                    const newExpense = {
                        amount: amount,
                        description: finalDesc,
                        date: finalDate,
                        type: finalType
                    };
                    if (finalDebtId) newExpense.debtId = finalDebtId;
                    
                    if (db) {
                        const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid);
                        await addDoc(expensesRef, newExpense);
                    }
                    
                    setAmountInput('');
                    setDescInput('');
                    
                    if (document.activeElement && document.activeElement.blur) {
                        document.activeElement.blur();
                    }
                    setTimeout(() => {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 50);
                }
            };

            const handleAddIncome = async (e) => {
                e.preventDefault();
                const amount = parseFloat(incomeAmountInput.replace(/\D/g, ''));
                if (amount > 0 && incomeDescInput.trim()) {
                    const newIncome = {
                        amount: amount,
                        description: incomeDescInput.trim(),
                        date: new Date().toISOString(),
                        type: 'income'
                    };
                    
                    if (db) {
                        const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid);
                        await addDoc(expensesRef, newIncome);
                    }
                    
                    setIncomeAmountInput('');
                    setIncomeDescInput('');
                    setIsIncomeModalOpen(false);
                }
            };

            const handleEditExpense = async (id, field, value) => {
                if (db) {
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid, id);
                    await updateDoc(ref, { [field]: value });
                }
            };

            const handleDeleteExpense = async (id) => {
                if (db) {
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'expenses_' + uid, id);
                    await deleteDoc(ref);
                }
            };

            // ==========================================
            // SWIPE & SCROLL LOGIC
            // ==========================================
            const onTouchStart = (e) => {
                setTouchEndPos({x: null, y: null});
                setTouchStartPos({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
            };
            const onTouchMove = (e) => {
                setTouchEndPos({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
            };
            const onTouchEnd = () => {
                if (!touchStartPos.x || !touchEndPos.x) return;
                const distanceX = touchStartPos.x - touchEndPos.x;
                const distanceY = touchStartPos.y - touchEndPos.y;
                
                if (Math.abs(distanceX) > Math.abs(distanceY) && Math.abs(distanceX) > 50) {
                    if (distanceX > 0 && currentView === 'home') setCurrentView('calendar'); 
                    else if (distanceX < 0 && currentView === 'calendar') setCurrentView('home'); 
                }
            };

            const changeMonth = (delta) => {
                const today = new Date();
                const nextTarget = new Date(today.getFullYear(), today.getMonth() + currentMonthOffset + delta, 1);
                const startLimit = new Date(createdAtTime);
                startLimit.setDate(1);
                startLimit.setHours(0,0,0,0);

                if (nextTarget < startLimit) return;

                setMonthAnimDir(delta); 
                setIsAnimatingMonth(true);
                setTimeout(() => {
                    setCurrentMonthOffset(prev => prev + delta);
                    setIsAnimatingMonth(false);
                }, 150);
            };

            const isStartMonth = () => {
                const today = new Date();
                const currentRenderedMonth = new Date(today.getFullYear(), today.getMonth() + currentMonthOffset, 1);
                const startLimit = new Date(createdAtTime);
                startLimit.setDate(1);
                startLimit.setHours(0,0,0,0);
                return currentRenderedMonth <= startLimit;
            };

            const onCalendarTouchEnd = (e) => {
                if (!touchStartPos.y || !touchEndPos.y) return;
                const distanceX = touchStartPos.x - touchEndPos.x;
                const distanceY = touchStartPos.y - touchEndPos.y;
                if (Math.abs(distanceY) > Math.abs(distanceX) && Math.abs(distanceY) > 50) {
                    if (distanceY > 0) changeMonth(1);
                    else changeMonth(-1);
                }
            };

            const handleHomeScroll = (e) => {
                const scrollTop = e.target.scrollTop;
                if (scrollTop > 80 && !isScrolled) setIsScrolled(true);
                else if (scrollTop < 20 && isScrolled) setIsScrolled(false);
            };

            const isDangerBadge = dailyAllowance <= 20000;

            // ==========================================
            // RENDER LOGIC
            // ==========================================
            if (isSplashVisible) {
                return <SplashScreen onComplete={() => setIsSplashVisible(false)} />;
            }

            if (loginStep === 'auth') {
                return (
                    <div className="fixed inset-0 bg-white dark:bg-[#0a0a0a] flex flex-col items-center justify-center p-6 z-50">
                        <div className="w-12 h-12 border-4 border-green-200 border-t-green-500 rounded-full animate-spin"></div>
                        <p className="mt-4 text-gray-500 dark:text-gray-400 font-medium">Connecting...</p>
                    </div>
                );
            }

            if (loginStep === 'login') {
                return (
                    <div className="fixed inset-0 bg-white dark:bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-center z-50">
                        <PWANotif show={showPWANotif} onInstall={handleInstallApp} onClose={() => setShowPWANotif(false)} />
                        
                        <div className="w-full max-w-sm flex flex-col items-center">
                            
                            <div className="flex items-end mb-4">
                                <h1 className="text-6xl font-black text-gray-900 dark:text-white tracking-tighter">Wang</h1>
                                <div className="w-4 h-4 bg-green-500 rounded-full ml-1.5 mb-1.5"></div>
                            </div>

                            <p className="text-sm text-gray-500 dark:text-gray-400 mb-10 px-2 font-medium leading-relaxed">
                                atur pengeluaran biar kamu selamat sampai akhir bulan, dan biar ga insomnia uang habis ke mana
                            </p>

                            <div className="w-full space-y-3">
                                <p className="text-xs font-bold text-gray-400 dark:text-gray-500 mb-4 uppercase tracking-widest">
                                    Login biar pengeluaranmu tersimpan
                                </p>

                                <button 
                                    onClick={handleGoogleLogin}
                                    className="w-full py-4 bg-white dark:bg-[#171717] border border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-[#262626] text-gray-700 dark:text-gray-200 rounded-2xl font-bold text-[15px] transition-transform active:scale-95 flex items-center justify-center shadow-sm"
                                >
                                    <GoogleIcon className="w-5 h-5 mr-3" />
                                    Lanjutkan dengan Google
                                </button>
                                
                                <div className="flex items-center py-2 opacity-50">
                                    <div className="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
                                    <span className="px-4 text-xs text-gray-400 font-bold uppercase tracking-wider">atau</span>
                                    <div className="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
                                </div>

                                <button 
                                    type="button"
                                    onClick={handleGuestLogin}
                                    className="w-full py-4 bg-gray-100 dark:bg-[#262626] hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-2xl font-bold text-[15px] transition-transform active:scale-95 shadow-sm"
                                >
                                    Lanjut sebagai Guest
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loginStep === 'setup') {
                return (
                    <div className="fixed inset-0 bg-white dark:bg-[#0a0a0a] flex flex-col items-center justify-center p-6 z-50">
                        <PWANotif show={showPWANotif} onInstall={handleInstallApp} onClose={() => setShowPWANotif(false)} />
                        {isGlass && (
                            <style>{`
                                :root {
                                    --theme-main: ${appSettings.customTheme};
                                    --theme-glow: ${appSettings.customTheme.replace('rgb', 'rgba').replace(')', ', 0.5)')};
                                    --theme-glow-strong: ${appSettings.customTheme.replace('rgb', 'rgba').replace(')', ', 0.8)')};
                                    --theme-light: ${appSettings.customTheme.replace('rgb', 'rgba').replace(')', ', 0.15)')};
                                }
                                .theme-bg { background-color: var(--theme-main) !important; color: white !important; }
                                .theme-text { color: var(--theme-main) !important; }
                                .theme-border { border-color: var(--theme-main) !important; }
                                .theme-ring { --tw-ring-color: var(--theme-main) !important; }
                                .theme-bg-light { background-color: var(--theme-light) !important; }
                            `}</style>
                        )}
                        <div className="w-full max-w-md space-y-6">
                        
                        {setupStep === 1 && (
                            <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white text-center mb-8">Siapa nama kamu?</h1>
                                <div className="space-y-4">
                                    <input
                                        type="text"
                                        value={userProfile.name}
                                        onChange={(e) => setUserProfile({...userProfile, name: e.target.value})}
                                        placeholder="Nama Asli"
                                        className="w-full px-5 py-4 text-[16px] bg-white dark:bg-[#171717] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-800 rounded-2xl focus:border-blue-500 outline-none transition-colors"
                                    />
                                    <input
                                        type="number"
                                        value={userProfile.age}
                                        onChange={(e) => setUserProfile({...userProfile, age: e.target.value})}
                                        placeholder="Umur"
                                        className="w-full px-5 py-4 text-[16px] bg-white dark:bg-[#171717] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-800 rounded-2xl focus:border-blue-500 outline-none transition-colors"
                                    />
                                    <div className="flex gap-4 pt-4">
                                        <button 
                                            onClick={() => setUserProfile({...userProfile, gender: 'male'})}
                                            className={`flex-1 py-8 rounded-2xl border-2 text-4xl transition-all ${userProfile.gender === 'male' ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/30 scale-105' : 'border-gray-200 dark:border-gray-800 bg-white dark:bg-[#171717] hover:bg-gray-50 dark:hover:bg-gray-800'}`}
                                        >
                                            👨
                                        </button>
                                        <button 
                                            onClick={() => setUserProfile({...userProfile, gender: 'female'})}
                                            className={`flex-1 py-8 rounded-2xl border-2 text-4xl transition-all ${userProfile.gender === 'female' ? 'border-pink-500 bg-pink-50 dark:bg-pink-900/30 scale-105' : 'border-gray-200 dark:border-gray-800 bg-white dark:bg-[#171717] hover:bg-gray-50 dark:hover:bg-gray-800'}`}
                                        >
                                            👩
                                        </button>
                                    </div>
                                    <button 
                                        onClick={() => setSetupStep(2)}
                                        disabled={!userProfile.name || !userProfile.age || !userProfile.gender}
                                        className="w-full mt-8 py-4 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 rounded-2xl font-bold text-lg disabled:opacity-50"
                                    >
                                        Lanjut
                                    </button>
                                </div>
                            </div>
                        )}

                        {setupStep === 2 && (
                            <form onSubmit={(e) => { e.preventDefault(); setSetupStep(3); }} className="animate-in fade-in slide-in-from-right-4 duration-300">
                                <div className="mx-auto w-16 h-16 bg-green-100 dark:bg-green-900/40 rounded-full flex items-center justify-center mb-6">
                                    <Wallet className="w-8 h-8 text-green-600 dark:text-green-400" />
                                </div>
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white text-center mb-8">Tentukan Anggaranmu</h1>
                                
                                <div className="space-y-4">
                                    <div className="relative">
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 font-bold">Rp</span>
                                        <input
                                            type="text"
                                            value={budget ? budget.toLocaleString('id-ID') : ''}
                                            onChange={(e) => {
                                                const rawValue = e.target.value.replace(/\D/g, '');
                                                setBudget(rawValue ? parseFloat(rawValue) : 0);
                                            }}
                                            placeholder="Total Anggaran Bulanan"
                                            className="w-full pl-12 pr-4 py-4 text-[16px] bg-white dark:bg-[#171717] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-800 rounded-2xl focus:border-green-500 outline-none"
                                            required
                                        />
                                    </div>

                                    <div className="relative">
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 font-bold">Rp</span>
                                        <input
                                            type="text"
                                            value={userProfile.promiseBudget ? parseInt(userProfile.promiseBudget).toLocaleString('id-ID') : ''}
                                            onChange={(e) => {
                                                const rawValue = e.target.value.replace(/\D/g, '');
                                                setUserProfile({...userProfile, promiseBudget: rawValue ? parseInt(rawValue) : ''});
                                            }}
                                            placeholder="Target Pengeluaran Harian"
                                            className="w-full pl-12 pr-4 py-4 text-[16px] bg-white dark:bg-[#171717] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-800 rounded-2xl focus:border-green-500 outline-none"
                                            required
                                        />
                                    </div>

                                    <div className="relative">
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400"><CalendarIcon className="w-5 h-5"/></span>
                                        <input
                                            type="number"
                                            min="1"
                                            max="31"
                                            value={paycheckDate}
                                            onChange={(e) => setPaycheckDate(e.target.value ? parseInt(e.target.value) : '')}
                                            placeholder="Tanggal Gajian (1-31)"
                                            className="w-full pl-12 pr-4 py-4 text-[16px] bg-white dark:bg-[#171717] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-800 rounded-2xl focus:border-green-500 outline-none"
                                            required
                                        />
                                    </div>

                                    <button type="submit" className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-bold text-lg active:scale-95 transition-all mt-6">
                                        Lanjut
                                    </button>
                                </div>
                            </form>
                        )}

                        {setupStep === 3 && (
                            <form onSubmit={handleFinishSetup} className="animate-in fade-in slide-in-from-right-4 duration-300">
                                <h1 className="text-3xl font-bold text-gray-900 dark:text-white text-center mb-8">Apa yang ingin dilacak?</h1>
                                <div className="space-y-4">
                                    {['spending', 'debt'].map(item => (
                                        <label key={item} className={`flex items-center p-4 border-2 rounded-2xl cursor-pointer transition-all ${userProfile.trackedItems?.includes(item) ? 'border-green-500 bg-green-50 dark:bg-green-900/30' : 'border-gray-200 dark:border-gray-800 bg-white dark:bg-[#171717]'}`}>
                                            <input type="checkbox" className="hidden" 
                                                checked={userProfile.trackedItems?.includes(item)}
                                                onChange={(e) => {
                                                    let newItems = userProfile.trackedItems ? [...userProfile.trackedItems] : [];
                                                    if (e.target.checked) newItems.push(item);
                                                    else newItems = newItems.filter(i => i !== item);
                                                    if (newItems.length === 0) newItems = ['spending'];
                                                    const newDefault = newItems.includes(userProfile.defaultTab) ? userProfile.defaultTab : newItems[0];
                                                    setUserProfile({...userProfile, trackedItems: newItems, defaultTab: newDefault});
                                                }}
                                            />
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-4 ${userProfile.trackedItems?.includes(item) ? 'border-green-500 bg-green-500' : 'border-gray-300 dark:border-gray-600'}`}>
                                                {userProfile.trackedItems?.includes(item) && <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"/></svg>}
                                            </div>
                                            <span className="font-semibold text-lg text-gray-900 dark:text-white">{item === 'spending' ? 'Pengeluaran' : 'Hutang'}</span>
                                        </label>
                                    ))}
                                    <button type="submit" className="w-full py-4 bg-green-500 hover:bg-green-600 theme-bg text-white rounded-2xl font-bold text-lg active:scale-95 transition-all mt-8">
                                        Mulai Bertahan
                                    </button>
                                </div>
                            </form>
                        )}
                        </div>
                    </div>
                );
            }

            return (
                <div 
                    className="fixed inset-0 flex justify-center w-full overflow-hidden transition-colors duration-300"
                    style={{
                        backgroundImage: isGlass ? `url(${appSettings.customThemeImage})` : 'none',
                        backgroundSize: 'cover',
                        backgroundPosition: 'center',
                        backgroundColor: isGlass ? 'transparent' : ''
                    }}
                >
                    <PWANotif show={showPWANotif} onInstall={handleInstallApp} onClose={() => setShowPWANotif(false)} />
                    
                    {isGlass && (
                        <style>{`
                            :root {
                                --theme-main: ${appSettings.customTheme};
                                --theme-glow: ${appSettings.customTheme.replace('rgb', 'rgba').replace(')', ', 0.5)')};
                                --theme-glow-strong: ${appSettings.customTheme.replace('rgb', 'rgba').replace(')', ', 0.8)')};
                                --theme-light: ${appSettings.customTheme.replace('rgb', 'rgba').replace(')', ', 0.15)')};
                            }
                            .theme-bg { background-color: var(--theme-main) !important; color: white !important; }
                            .theme-text { color: var(--theme-main) !important; }
                            .theme-border { border-color: var(--theme-main) !important; }
                            .theme-ring { --tw-ring-color: var(--theme-main) !important; }
                            .theme-bg-light { background-color: var(--theme-light) !important; }
                        `}</style>
                    )}

                    <div className={`w-full max-w-md h-full relative shadow-sm overflow-hidden flex flex-col transition-colors duration-300 ${isGlass ? 'bg-transparent' : 'bg-gray-100 dark:bg-[#262626]'}`}>
                        
                        <div 
                            className="flex w-[200%] flex-1 min-h-0 transition-transform duration-300 ease-in-out"
                            style={{ transform: currentView === 'calendar' ? 'translateX(-50%)' : 'translateX(0)' }}
                            onTouchStart={onTouchStart}
                            onTouchMove={onTouchMove}
                            onTouchEnd={onTouchEnd}
                        >
                        
                            {/* ======================= HOME PANE ======================= */}
                            <div className="w-1/2 h-full flex flex-col relative overflow-hidden transition-colors duration-300 bg-transparent">
                                
                                {(() => {
                                    const availableTabs = [
                                        { id: 'spending', label: 'Pengeluaran' },
                                        { id: 'debt', label: 'Hutang' }
                                    ].filter(t => userProfile.trackedItems?.includes(t.id));
