<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { theme: 'var(--theme-color)' }
                }
            }
        }

    <style>
        :root {
            --theme-color: #22c55e; /* Default Green */
            --theme-color-dark: #16a34a;
        }

        html, body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: pan-x pan-y;
            overscroll-behavior-y: none;
            margin: 0; padding: 0;
            transition: background-color 0.3s;
        }
        
        body { background-color: #f9fafb; }
        html.dark body { background-color: #030712; }

        #root { width: 100%; height: 100%; }

        @keyframes breathe {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.25; }
        }
        .animate-breathe { animation: breathe 3s ease-in-out infinite; }
        
        @keyframes slideDownNotif {
            from { transform: translateY(-150%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-down-notif { animation: slideDownNotif 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .pb-safe { padding-bottom: max(24px, env(safe-area-inset-bottom)); }
        ::-webkit-scrollbar { display: none; }
        
        input[type="text"], input[type="number"], select { font-size: 16px !important; }

        .receipt-mask {
            padding-top: 12px; padding-bottom: 12px;
            --mask: 
                conic-gradient(from -45deg at bottom, #0000, #000 1deg 89deg, #0000 90deg) 50% 100% / 12px 51% repeat-x,
                conic-gradient(from 135deg at top, #0000, #000 1deg 89deg, #0000 90deg) 50% 0% / 12px 51% repeat-x;
            -webkit-mask: var(--mask); mask: var(--mask);
        }

        /* SPLASH SCREEN STYLES */
        @import url("https://fonts.googleapis.com/css2?family=Heebo:wght@900&display=swap");
        .splash-wrapper { height: 100dvh; width: 100vw; margin: 0; padding: 0; background: #ffffff; color: black; font-family: "Heebo", sans-serif; overflow: hidden; display: flex; flex-direction: row; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; z-index: 99999; }
        html.dark .splash-wrapper { background: #030712; color: white; }
        .splash-wrapper * { box-sizing: border-box; position: relative; }
        .splash-container { display: grid; align-items: center; justify-items: center; }
        .splash-container > * { grid-area: 1 / 1; }
        .splash-title { font-size: 10vmin; margin: 0; font-family: Arial, sans-serif; font-weight: bold; }
        .splash-title .char { --char-offset: calc(var(--char-index) - (var(--char-total) / 2)); --distance-percent: calc(var(--char-index) / var(--char-total)); --delay: calc(1.1s + (0.25s * (1 - var(--distance-percent)))); animation: splash-text-in 0.4s cubic-bezier(0.5, 0, 0.5, 1) var(--delay) backwards; transform-origin: center 1em; display: inline-block; }
        @keyframes splash-text-in { 0% { opacity: 0; transform: translateX(calc(-0.4em * var(--char-offset))) scale(0); } 90% { transform: translateX(0em) scale(1.1); } }
        .splash-title .char[data-char="u"], .splash-title .char[data-char="U"] { visibility: hidden; --squish-scale: 0.6; --squish-y: 10%; }
        .splash-title .char[data-char="u"]::before, .splash-title .char[data-char="U"]::before { content: attr(data-char); visibility: visible; position: absolute; left: 0; top: 0; animation: splash-text-squish 4s cubic-bezier(0.5, 0, 0.5, 1) forwards; color: inherit; transform-origin: center 1em; }
        @keyframes splash-text-squish { 47.5%, 52.5% { transform: none; } 50% { transform: translateY(calc(var(--squish-y) * 1)) scaleY(calc(var(--squish-scale) * 1)); } }
        .splash-title .char:last-child { animation: splash-text-in 0.4s cubic-bezier(0.5, 0, 0.5, 1) var(--delay) backwards, splash-text-bonk 4s cubic-bezier(0.5, 0, 0.5, 1) forwards; }
        @keyframes splash-text-bonk { 80%, 85%, to { transform: none; } 82% { transform: translateX(-20%); } }
        .splash-dot { font-size: 5vmin; width: 1em; height: 1em; animation: splash-dot 4s cubic-bezier(0.5, 0, 0.5, 1) both; z-index: 10; }
        .splash-dot-inner { animation: splash-dot-inner 4s cubic-bezier(0.5, 0, 0.5, 1) both; content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; overflow: hidden; display: grid; align-items: center; justify-items: center; }
        .splash-dot-inner > * { grid-area: 1 / 1; }
        .splash-dot-wave { width: 200%; height: 200%; fill: var(--theme-color); animation: splash-wave-in 1s cubic-bezier(0.5, 0, 0.5, 1); --offset-x: -110%; }
        @keyframes splash-wave-in { 0% { transform: translateY(100%) translateX(var(--offset-x)); } 70% { transform: translateY(30%) translateX(0%); } }
        .splash-dot-wave.background { fill: var(--theme-color-dark); animation-duration: 0.95s; --offset-x: 110%; }
        @keyframes splash-dot { from { opacity: 0; transform: scale(3); } 10% { opacity: 1; transform: scale(3); } 15% { transform: scale(3) translateY(0.5em) scaleY(1.5); } 20% { transform: scale(1) translateY(-300%); } 30% { transform: translateY(1em) scaleY(0.5); } 40% { transform: translateY(-400%); } 50% { transform: translateY(-1em); } 53% { transform: translateY(-300%); } 56% { transform: translateY(-1em); } 59% { transform: translateY(-200%); } 62% { transform: translateY(1em); } 80%, 90%, to { transform: translateY(calc(0.2em + 2px)); } }
        @keyframes splash-dot-inner { from, 45% { transform: none; } 70% { transform: translateX(7em); animation-timing-function: cubic-bezier(0.5, 0, 1, 0); } 80% { transform: translateX(5.3em); animation-timing-function: cubic-bezier(0.5, 0, 0.5, 1); } 83%, to { transform: translateX(5.4em); } }
    </style>
</head>

        // --- ICONS ---
        const Wallet = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a8 8 0 0 1-5 7H5a2 2 0 0 1-2-2V4"/></svg>;

        const SettingsIcon = ({ className, strokeWidth }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth || "2"} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const XIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18M6 6l12 12"/></svg>;
        const ChevronLeft = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronUp = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 15-6-6-6 6"/></svg>;
        const ChevronDown = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const Edit3 = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
        const LogOutIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const GoogleIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>;
        const Plus = ({ className, strokeWidth }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth || "2"} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const DownloadIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const ImageInfo = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;

        const generateUUID = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return Math.random().toString(36).substring(2) + Date.now().toString(36);
        };

        // --- EXTRACT DOMINANT COLOR FROM IMAGE ---
        const extractDominantColor = (imageUrl) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    try {
                        const data = ctx.getImageData(0,0, canvas.width, canvas.height).data;
                        let r=0, g=0, b=0, count=0;
                        for(let i=0; i<data.length; i+=16) { // skip pixels for speed
                            r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
                        }
                        resolve(`rgb(${~~(r/count)}, ${~~(g/count)}, ${~~(b/count)})`);
                    } catch(e) { resolve('#22c55e'); }
                };
                img.onerror = () => resolve('#22c55e');
                img.src = imageUrl;
            });
        };

        const PWANotif = ({ show, onInstall, onClose }) => {
            if (!show) return null;
            return (
                <div className="fixed top-4 left-0 right-0 z-[100000] px-4 flex justify-center animate-slide-down-notif">

                        <div className="w-12 h-12 rounded-[10px] bg-gray-100 overflow-hidden flex-shrink-0 border border-gray-200 dark:border-gray-700">
